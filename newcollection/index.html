<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>铜の币纪主站</title>
    <link rel="stylesheet" href="layout.css">
    <!-- Hammer.js 手势库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
</head>
<body>

<div class="app-layout">
    <!-- 顶部搜索栏 -->
    <div class="top-search-container">
        <div class="search-bar">
            <select class="search-select" id="searchType">
                <option value="all">全字段搜索</option>
                <option value="name">按名称搜索</option>
                <option value="version">按冠字号搜索</option>
                <option value="year">按年份搜索</option>
                <option value="agency">按评级机构搜索</option>
                <option value="krause">按目录编号搜索</option>
            </select>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索..." autocomplete="off">
            <button class="search-btn" id="searchBtn">搜索</button>
            <span class="mode-toggle" id="modeToggle" title="切换搜索模式">□</span>
            <button class="reset-btn" id="resetBtn">重置</button>
        </div>
        <div class="search-tip" id="searchTip">当前模式：点击搜索 | 点击"□"可切换</div>
    </div>

    <div class="body-row">
        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar"></div>
        <!-- 侧边栏折叠按钮 -->
        <button class="sidebar-toggle" id="sidebarToggle">◀</button>
        <!-- 内容区 -->
        <div class="content">
            <div id="app"></div>
        </div>
    </div>

    <!-- 底部Tab栏 -->
    <div class="bottom-tabbar">
        <div class="tab-item active" data-target="notes">纸币</div>
        <div class="tab-item" data-target="coins">硬币</div>
        <div class="tab-item" data-target="special">专题</div>
        <div class="tab-item" data-target="articles">文章</div>
        <div class="tab-item" data-target="settings">我的</div>
    </div>
</div>

<!-- 图片弹窗 -->
<div id="imageModal" class="modal">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div class="modal-content" id="modalContent">
        <div class="image-container" id="imageContainer">
            <img id="modalImg" class="modal-img" src="" alt="预览图">
        </div>
    </div>
    <div class="modal-tip">双指缩放 | 拖动查看 | 点击背景关闭</div>
</div>
