<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaTeX 答题卡生成器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f2f5;
    font-family: 'Microsoft YaHei', 'PingFang SC', system-ui, sans-serif;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: #fff;
    padding: 18px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header h1 span { color: #ff32a5; }
  .header .sub { font-size: 13px; color: #aaa; }

  .main-container {
    display: flex;
    gap: 20px;
    padding: 20px;
    max-width: 1600px;
    margin: 0 auto;
    min-height: calc(100vh - 70px);
  }

  /* 左侧面板 */
  .left-panel {
    flex: 0 0 380px;
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow-y: auto;
    max-height: calc(100vh - 110px);
  }
  .left-panel h3 { font-size: 15px; margin-bottom: 16px; color: #333; }

  .form-group {
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    font-size: 13px;
    transition: border 0.2s;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: #ff32a5;
    outline: none;
    box-shadow: 0 0 0 2px rgba(255,50,165,0.1);
  }
  .form-row {
    display: flex;
    gap: 10px;
  }
  .form-row .form-group { flex: 1; }

  .btn-group {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: #ff32a5;
    color: #fff;
    flex: 1;
    justify-content: center;
  }
  .btn-primary:hover { background: #e02a94; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-secondary {
    background: #f0f0f0;
    color: #333;
  }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-success {
    background: #52c41a;
    color: #fff;
  }
  .btn-success:hover { background: #45a818; }
  .btn-outline {
    background: transparent;
    border: 1px solid #d9d9d9;
    color: #555;
  }
  .btn-outline:hover { border-color: #ff32a5; color: #ff32a5; }

  /* 右侧面板 */
  .right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }

  .tab-bar {
    display: flex;
    gap: 2px;
    background: #e8e8e8;
    padding: 3px;
    border-radius: 10px;
    align-self: flex-start;
  }
  .tab-item {
    padding: 6px 18px;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    color: #666;
    transition: all 0.2s;
  }
  .tab-item.active {
    background: #fff;
    color: #333;
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .code-editor {
    background: #1e1e2e;
    border-radius: 10px;
    overflow: hidden;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .code-header {
    background: #181825;
    padding: 8px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #888;
    font-size: 12px;
  }
  .code-header .lang { color: #6c6; }
  .code-body {
    flex: 1;
    overflow: auto;
  }
  .code-body textarea {
    width: 100%;
    height: 100%;
    min-height: 400px;
    background: transparent;
    color: #cdd6f4;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    border: none;
    outline: none;
    padding: 14px;
    resize: none;
    tab-size: 2;
  }
  .code-body textarea::placeholder { color: #555; }

  /* 编译状态 */
  .compile-status {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .compile-status.loading {
    display: flex;
    background: #fff7e6;
    border: 1px solid #ffd591;
    color: #ad6800;
  }
  .compile-status.success {
    display: flex;
    background: #f6ffed;
    border: 1px solid #b7eb8f;
    color: #389e0d;
  }
  .compile-status.error {
    display: flex;
    background: #fff2f0;
    border: 1px solid #ffccc7;
    color: #cf1322;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #ffd591;
    border-top: 2px solid #ad6800;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* PDF 预览 */
  .pdf-preview {
    flex: 1;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: none;
  }
  .pdf-preview.show { display: block; }
  .pdf-preview embed {
    width: 100%;
    height: 100%;
    min-height: 600px;
    border: none;
  }

  .placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #fff;
    border-radius: 10px;
    color: #bbb;
    font-size: 14px;
    gap: 12px;
    min-height: 400px;
  }
  .placeholder .icon { font-size: 48px; opacity: 0.5; }

  .color-picker-group {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .color-picker-group input[type="color"] {
    width: 40px; height: 34px;
    padding: 2px;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    cursor: pointer;
  }
  .color-presets {
    display: flex;
    gap: 4px;
  }
  .color-preset {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border 0.2s;
  }
  .color-preset:hover, .color-preset.active { border-color: #333; }

  @media (max-width: 900px) {
    .main-container { flex-direction: column; }
    .left-panel { flex: none; max-height: none; }
  }

  /* 答题卡预览小提示 */
  .tip-box {
    background: #f9f0ff;
    border: 1px solid #d3adf7;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #531dab;
    margin-top: 12px;
    line-height: 1.6;
  }
  .tip-box strong { font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📝 <span>LaTeX</span> 答题卡生成器</h1>
    <div class="sub">基于真实 LaTeX 编译 · 适用于 GitHub Pages 静态托管</div>
  </div>
  <div>
    <a href="https://github.com" target="_blank" style="color:#aaa;text-decoration:none;font-size:13px;">⬇ 下载 .tex</a>
  </div>
</div>

<div class="main-container">

  <!-- ========== 左侧：参数面板 ========== -->
  <div class="left-panel">
    <h3>⚙️ 答题卡参数</h3>

    <div class="form-row">
      <div class="form-group">
        <label>科目</label>
        <input id="subject" value="数学">
      </div>
      <div class="form-group">
        <label>年份</label>
        <input id="year" value="2025">
      </div>
    </div>

    <div class="form-group">
      <label>主颜色</label>
      <div class="color-picker-group">
        <input id="mainColor" type="color" value="#ff32a5">
        <div class="color-presets">
          <div class="color-preset active" style="background:#ff32a5" data-color="#ff32a5"></div>
          <div class="color-preset" style="background:#ff0000" data-color="#ff0000"></div>
          <div class="color-preset" style="background:#ff00ff" data-color="#ff00ff"></div>
          <div class="color-preset" style="background:#ff1919" data-color="#ff1919"></div>
          <div class="color-preset" style="background:#000000" data-color="#000000"></div>
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>选择题数</label>
        <input id="choiceCount" type="number" value="11" min="1" max="30">
      </div>
      <div class="form-group">
        <label>填空题数</label>
        <input id="blankCount" type="number" value="3" min="0" max="10">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>第15题分值</label>
        <input id="score15" value="13">
      </div>
      <div class="form-group">
        <label>第16题分值</label>
        <input id="score16" value="15">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>第17题分值</label>
        <input id="score17" value="15">
      </div>
      <div class="form-group">
        <label>第18题分值</label>
        <input id="score18" value="17">
      </div>
    </div>

    <div class="form-group">
      <label>第19题分值</label>
      <input id="score19" value="17">
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="generateLatex()">📄 生成 LaTeX 源码</button>
    </div>
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="downloadTex()">⬇ 下载 .tex</button>
      <button class="btn btn-success" onclick="compileLatex()" id="compileBtn">▶ 编译为 PDF</button>
    </div>

    <div class="tip-box">
      <strong>💡 编译说明</strong><br>
      点击「编译为 PDF」将调用 <code>latexonline.cc</code> 免费 API 进行真实 LaTeX 编译。<br>
      如需离线使用，可下载 .tex 文件后在 Overleaf / 本地 TeX Live 中编译。<br>
      也可搭配 <strong>GitHub Actions</strong> 自动编译部署到 Pages。
    </div>
  </div>

  <!-- ========== 右侧：代码 + PDF ========== -->
  <div class="right-panel">
    <div class="tab-bar">
      <button class="tab-item active" onclick="switchTab('source', this)">📄 LaTeX 源码</button>
      <button class="tab-item" onclick="switchTab('pdf', this)">📄 PDF 预览</button>
    </div>

    <div id="tab-source" class="tab-content" style="display:flex;flex-direction:column;flex:1;">
      <div class="code-editor" style="flex:1;">
        <div class="code-header">
          <span class="lang">📄 answer-card.tex</span>
          <span style="color:#666;" id="lineCount">0 行</span>
        </div>
        <div class="code-body">
          <textarea id="latexSource" placeholder="点击「生成 LaTeX 源码」…" spellcheck="false"></textarea>
        </div>
      </div>
      <div id="compileStatus" class="compile-status"></div>
    </div>

    <div id="tab-pdf" class="tab-content" style="display:none;flex:1;flex-direction:column;">
      <div class="pdf-preview show" id="pdfContainer" style="flex:1;">
        <embed id="pdfEmbed" type="application/pdf">
      </div>
      <div class="placeholder" id="pdfPlaceholder">
        <div class="icon">📄</div>
        <div>先点击「编译为 PDF」生成文件</div>
        <div style="font-size:12px;color:#ccc;">或下载 .tex 在本地编译</div>
      </div>
    </div>
  </div>

</div>

<script>
// ================================================================
//  颜色预设点击
// ================================================================
document.querySelectorAll('.color-preset').forEach(el => {
  el.addEventListener('click', function() {
    document.querySelectorAll('.color-preset').forEach(e => e.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('mainColor').value = this.dataset.color;
  });
});
document.getElementById('mainColor').addEventListener('input', function() {
  document.querySelectorAll('.color-preset').forEach(e => e.classList.remove('active'));
});

// ================================================================
//  Tab 切换
// ================================================================
function switchTab(name, btn) {
  document.querySelectorAll('.tab-item').forEach(e => e.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(e => e.style.display = 'none');
  document.getElementById('tab-' + name).style.display = name === 'source' ? 'flex' : 'flex';
}

// ================================================================
//  生成 LaTeX 源码（基于原模板）
// ================================================================
function generateLatex() {
  const cfg = {
    subject: document.getElementById('subject').value || '数学',
    year: document.getElementById('year').value || '2025',
    color: document.getElementById('mainColor').value || '#ff32a5',
    choiceCount: parseInt(document.getElementById('choiceCount').value) || 11,
    blankCount: parseInt(document.getElementById('blankCount').value) || 3,
    s15: document.getElementById('score15').value || '13',
    s16: document.getElementById('score16').value || '15',
    s17: document.getElementById('score17').value || '15',
    s18: document.getElementById('score18').value || '17',
    s19: document.getElementById('score19').value || '17',
  };

  // 解析 RGB
  const hex = cfg.color.replace('#','');
  const r = parseInt(hex.substr(0,2), 16);
  const g = parseInt(hex.substr(2,2), 16);
  const b = parseInt(hex.substr(4,2), 16);

  // 构建完整的 LaTeX 文档
  let tex = `\\documentclass[UTF8, 11pt, oneside]{ctexart}
\\usepackage{amsmath, amsthm, amssymb, graphicx}
\\usepackage[bookmarks=true, colorlinks, citecolor=blue, linkcolor=black]{hyperref}
\\usepackage[a3paper, landscape, left=0.7cm, right=0.7cm, top=0.6cm, bottom=0.6cm]{geometry}
\\usepackage{tikz}
\\linespread{1.625}
\\setcounter{page}{1}
\\usepackage[T1]{fontenc}
\\usepackage{mathptmx}
\\usepackage{fancyhdr}
\\usepackage{eso-pic}

\\definecolor{mycolor}{RGB}{${r},${g},${b}}

\\pagestyle{fancy}
\\fancyhf{}

\\AddToShipoutPictureFG{%
  \\begin{tikzpicture}[remember picture, overlay]
    \\fill[black] ([xshift=0.7cm, yshift=0.6cm] current page.south west) rectangle ++(10mm, 6mm);
    \\fill[black] ([xshift=13.9cm, yshift=0.6cm] current page.south west) rectangle ++(10mm, 6mm);
    \\fill[black] ([xshift=27.1cm, yshift=0.6cm] current page.south west) rectangle ++(10mm, 6mm);
    \\fill[black] ([xshift=-0.7cm, yshift=0.6cm] current page.south east) rectangle ++(-10mm, 6mm);
    \\fill[black] ([xshift=-0.7cm, yshift=-0.6cm] current page.north east) rectangle ++(-10mm, -6mm);
    \\fill[black] ([xshift=0.7cm, yshift=-0.6cm] current page.north west) rectangle ++(10mm, -6mm);
    \\fill[black] ([xshift=13.9cm, yshift=-0.6cm] current page.north west) rectangle ++(10mm, -6mm);
    \\fill[black] ([xshift=27.1cm, yshift=-0.6cm] current page.north west) rectangle ++(10mm, -6mm);
    \\node at (current page.south) [anchor=south, yshift=0.6cm]
      {\\color{mycolor}\\textbf{${cfg.subject}答题卡第\\thepage 面（共6面）}};
  \\end{tikzpicture}%
}

\\begin{document}

% ======================== 第一页 ========================
\\centering
\\begin{tikzpicture}
  \\useasboundingbox (0,0) rectangle (39.2,28.25);

  % 标题
  \\node[font=\\fontsize{16pt}{16pt}\\selectfont] at (6.45,27.3)
    {\\color{mycolor}\\textbf{${cfg.year}年普通高等学校招生全国统一考试}};
  \\node[font=\\fontsize{22pt}{22pt}\\selectfont] at (6.45,26.3)
    {\\textbf{${cfg.subject}答题卡}};
  \\node[right] at (0,25) {姓名：\\ \\textcolor{mycolor}{\\underline{\\hspace{6.5cm}}}};

  % 考生号
  \\def\\numberx{0}
  \\def\\numbery{24}
  \\def\\size{0.65}
  \\node[anchor=west] at (\\numberx,\\numbery) {考生号};
  \\def\\total{10}
  \\def\\numberD{1.5}
  \\def\\Distance{0.65}
  \\foreach \\col in {1,...,\\total} {
    \\draw[mycolor] (\\numberx+\\numberD+\\col*\\Distance-\\Distance,\\numbery+0.5*\\size) rectangle ++(\\size,-\\size);
  }

  % 条形码
  \\def\\Tx{8.35}
  \\def\\Ty{25.5}
  \\def\\Tw{4.55}
  \\def\\Th{1.825}
  \\draw[mycolor,dashed,thick] (\\Tx,\\Ty) rectangle ++(\\Tw,-\\Th);
  \\node[mycolor] at (\\Tx+0.5*\\Tw,\\Ty-0.5*\\Th) {\\textbf{条形码粘贴区}};

  % 黑色矩形定位
  \\def\\cellw{0.8}
  \\def\\beginx{4.9}
  \\def\\selectw{0.5}
  \\def\\selecth{0.25}
  \\foreach \\col in {1,2,...,15} {
    \\fill[black] (\\beginx+\\col*\\cellw-0.5*\\cellw-0.5*\\selectw-4.5,28.1) rectangle ++(\\selectw,-\\selecth);
  }

  % 注意事项
  \\def\\startx{0}
  \\def\\starty{23.2}
  \\def\\squarew{8}
  \\def\\squareh{4.4}
  \\draw[mycolor] (\\startx,\\starty) rectangle ++(\\squarew,-\\squareh);
  \\node[text width=7.6cm, align=left, anchor=north west] at (\\startx+0.1,\\starty-0.1)
    {\\fontsize{8pt}{8pt}\\selectfont\\textbf{注意事项}：\\\\
      \\hangindent=1.5em 1．答题前，考生务必用黑色字迹的钢笔或签字笔将姓名和考生号填写在答题卡上。\\\\
      \\hangindent=1.5em 2．回答选择题时，选出每小题答案以后，用\\hspace{0.1em}2B\\hspace{0.1em}铅笔把答题卡上对应题目的答案标号涂黑。如需改动，用橡皮擦擦干净后，再选其它答案标号涂黑。回答非选择题时，将答案写在答题卡上指定区域内，超出答题区域的答案无效。\\\\
      \\hangindent=1.5em 3．正确填涂试卷类型，否则答案无效。\\\\
      \\hangindent=1.5em 4．答题卡保持卡面整洁，不要折叠和弄破。\\\\
    };

  % 试卷类型
  \\def\\boxx{8.35}
  \\def\\boxy{20.8}
  \\def\\boxw{2.5}
  \\def\\boxh{2}
  \\draw[mycolor] (\\boxx,\\boxy) rectangle ++(\\boxw,-\\boxh);
  \\node[anchor=north west, align=left, font=\\fontsize{9pt}{9pt}\\selectfont] at (\\boxx+0.1, \\boxy-0.1)
    {\\textbf{试卷类型}：\\\\
      试卷A\\\\
      试卷B\\\\
    };
  \\draw[mycolor] (\\boxx+1.5,\\boxy-0.8) rectangle ++(\\selectw,-\\selecth);
  \\draw[mycolor] (\\boxx+1.5,\\boxy-1.3) rectangle ++(\\selectw,-\\selecth);
  \\fill[black] (-0.7,\\boxy-0.8) rectangle ++(\\selectw,-\\selecth);
  \\fill[black] (-0.7,\\boxy-1.3) rectangle ++(\\selectw,-\\selecth);

  % 填涂样例
  \\def\\samplex{8.35}
  \\def\\sampley{23.2}
  \\def\\samplew{4.55}
  \\def\\sampleh{2}
  \\draw[mycolor] (\\samplex,\\sampley) rectangle ++(\\samplew,-\\sampleh);
  \\node[anchor=north west, align=left, font=\\fontsize{9pt}{9pt}\\selectfont] at (\\samplex+0.1, \\sampley-0.1)
    {\\textbf{填涂样例}：\\\\
      正确填涂：\\\\
      错误填涂：\\\\
    };
  \\fill[black] (\\samplex+1.7,\\sampley-0.8) rectangle ++(\\selectw,-\\selecth);
  \\draw[mycolor] (\\samplex+1.7,\\sampley-1.3) rectangle ++(\\selectw,-\\selecth);
  \\draw[mycolor] (\\samplex+2.4,\\sampley-1.3) rectangle ++(\\selectw,-\\selecth);
  \\draw[mycolor] (\\samplex+3.1,\\sampley-1.3) rectangle ++(\\selectw,-\\selecth);
  \\draw[mycolor] (\\samplex+3.8,\\sampley-1.3) rectangle ++(\\selectw,-\\selecth);

  % 缺考标记
  \\def\\lessx{11.2}
  \\def\\lessy{20.8}
  \\def\\lessw{1.7}
  \\def\\lessh{2}
  \\draw[mycolor] (\\lessx,\\lessy) rectangle ++(\\lessw,-\\lessh);
  \\node[anchor=north west, align=left, font=\\fontsize{9pt}{9pt}\\selectfont] at (\\lessx+0.1, \\lessy-0.1)
    {\\textbf{缺考标记}\\\\};
  \\draw[mycolor] (\\lessx+0.5*\\lessw-0.5*\\selectw,\\lessy-1) rectangle ++(\\selectw,-\\selecth);

  % 大框
  \\def\\bigx{0}
  \\def\\bigy{18.4}
  \\def\\bigw{12.9}
  \\def\\bigh{17.8}
  \\draw[rounded corners=10pt, mycolor] (\\bigx,\\bigy) rectangle ++(\\bigw,-\\bigh);

  % 选择题框
  \\def\\chosex{0.2}
  \\def\\chosey{17.7}
  \\def\\chosew{12.5}
  \\def\\choseh{2.7}
  \\draw[black] (\\chosex,\\chosey) rectangle ++(\\chosew,-\\choseh);
  \\node[anchor=north west, align=left, font=\\fontsize{10pt}{9pt}\\selectfont] at (\\chosex+0.1, \\chosey+0.6)
    {\\textbf{一、选择题}\\\\};

// ================================================================
//  下载 .tex 文件
// ================================================================
function downloadTex() {
  const code = document.getElementById('latexSource').value;
  if (!code.trim()) { alert('请先生成 LaTeX 源码！'); return; }
  const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'answer-card.tex';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ================================================================
//  编译 LaTeX（调用 latexonline.cc API）
// ================================================================
async function compileLatex() {
  const code = document.getElementById('latexSource').value;
  if (!code.trim()) { alert('请先生成 LaTeX 源码！'); return; }

  const statusEl = document.getElementById('compileStatus');
  const compileBtn = document.getElementById('compileBtn');
  compileBtn.disabled = true;

  statusEl.className = 'compile-status loading';
  statusEl.innerHTML = '<div class="spinner"></div>⏳ 正在编译… 请稍候（约15-30秒）';

  try {
    // 使用 latexonline.cc API
    const response = await fetch('https://latexonline.cc/compile', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: code
    });

    if (!response.ok) throw new Error(`编译服务返回状态码 ${response.status}`);

    const blob = await response.blob();
    const pdfUrl = URL.createObjectURL(blob);

    // 显示 PDF
    document.getElementById('pdfEmbed').src = pdfUrl;
    document.getElementById('pdfContainer').style.display = 'block';
    document.getElementById('pdfPlaceholder').style.display = 'none';

    statusEl.className = 'compile-status success';
    statusEl.innerHTML = '✅ 编译成功！PDF 已生成，可在「PDF 预览」标签页查看。';

    // 自动切到 PDF 标签
    document.querySelectorAll('.tab-item')[1].click();

  } catch (err) {
    statusEl.className = 'compile-status error';
    statusEl.innerHTML = `❌ 编译失败：${err.message}<br>
      <span style="font-size:12px;">💡 请下载 .tex 文件后在 Overleaf 或本地 LaTeX 环境中编译。</span>`;
  } finally {
    compileBtn.disabled = false;
  }
}

// ================================================================
//  初始化：默认生成一次
// ================================================================
window.addEventListener('DOMContentLoaded', () => {
  generateLatex();
});
