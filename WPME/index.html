<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>词根斩 · Word Power Made Easy 词根记忆</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 20px;
            min-height: 100vh;
        }

        /* 主容器 */
        .app-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            padding: 28px 24px 32px;
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        /* 主页搜索区 */
        .hero {
            text-align: center;
            margin-bottom: 32px;
        }

        .hero h1 {
            font-size: 2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            font-size: 1rem;
            background: white;
            outline: none;
            transition: 0.2s;
        }

        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .btn {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #3b82f6;
        }

        .btn-outline:hover {
            background: #eff6ff;
        }

        .btn-secondary {
            background: #475569;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
        }

        .flex-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .mode-group {
            display: flex;
            gap: 12px;
            background: #eef2ff;
            padding: 6px 12px;
            border-radius: 60px;
        }

        .mode-btn {
            background: transparent;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }

        .mode-btn.active {
            background: #3b82f6;
            color: white;
        }

        /* 词根卡片内部 */
        .root-word {
            font-size: 2.8rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            background: #f8fafc;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 60px;
            margin-bottom: 24px;
            letter-spacing: 1px;
            border: 1px solid #e2e8f0;
        }

        .meaning {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 12px;
            border-left: 4px solid #3b82f6;
            padding-left: 16px;
        }

        .origin {
            color: #475569;
            background: #f1f5f9;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .example-title {
            font-weight: 600;
            margin: 18px 0 8px 0;
            font-size: 1rem;
            color: #334155;
        }

        .example-list {
            background: #f8fafc;
            border-radius: 24px;
            padding: 16px 20px;
            list-style: none;
        }

        .example-list li {
            margin-bottom: 12px;
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 8px;
        }

        .example-word {
            font-weight: 700;
            color: #0f172a;
        }

        .example-trans {
            color: #475569;
            margin-left: 8px;
        }

        .progress {
            font-size: 0.85rem;
            color: #3b82f6;
            background: #eef2ff;
            padding: 5px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 28px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }

        .footer-actions {
            margin-top: 24px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            font-family: monospace;
            margin-top: 8px;
            font-size: 0.8rem;
        }

        .seq-info {
            font-size: 0.75rem;
            color: #4b5563;
            word-break: break-all;
        }

        @media (max-width: 550px) {
            .card {
                padding: 20px;
            }
            .root-word {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <!-- 主页面 (首页) -->
    <div id="homeView" style="display: block;">
        <div class="hero">
            <h1>📖 词根斩 · Word Power</h1>
            <p style="color: #475569;">基于《Word Power Made Easy》| 词根词源记忆法</p>
        </div>
        <div class="card">
            <div style="margin-bottom: 20px;">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 搜索词根 / 示例单词 (如 ego, alter, 人类)" autocomplete="off">
                    <button class="btn" id="searchBtn">搜 索</button>
                </div>
            </div>
            <div class="mode-group" style="justify-content: center; margin-bottom: 28px;">
                <button class="mode-btn" id="modeChapterBtn">📚 按章节顺序</button>
                <button class="mode-btn" id="modeRandomBtn">🎲 随机顺序</button>
            </div>
            <div style="text-align: center;">
                <button class="btn" id="startBtn" style="padding: 12px 28px; font-size: 1.1rem;">🚀 开始记单词</button>
            </div>
            <div style="margin-top: 28px; background: #fef9c3; border-radius: 24px; padding: 16px;">
                <div style="font-weight: 600; margin-bottom: 8px;">📌 不懂词根序列 (跨设备同步)</div>
                <textarea id="exportSequenceArea" rows="2" placeholder="复制此序列到新设备即可同步“不懂”记录" readonly></textarea>
                <div class="flex-row" style="margin-top: 8px;">
                    <button class="btn btn-sm btn-outline" id="copySeqBtn">📋 复制序列</button>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="importSeqInput" placeholder="粘贴序列" style="flex:1; padding: 6px 12px; border-radius: 40px; border:1px solid #cbd5e1;">
                        <button class="btn btn-sm btn-secondary" id="importSeqBtn">恢复记录</button>
                    </div>
                </div>
                <div class="seq-info" id="statInfo">📊 当前不懂词根数量: 0</div>
            </div>
        </div>
    </div>

    <!-- 学习卡片视图 (默认隐藏) -->
    <div id="studyView" style="display: none;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 10px;">
                <span class="progress" id="studyProgress">第0/0个</span>
                <button class="btn btn-sm btn-outline" id="backHomeBtn">🏠 返回主页</button>
            </div>
            <div id="cardContent">
                <!-- 动态卡片内容 -->
            </div>
            <div class="nav-buttons">
                <button class="btn btn-outline" id="prevBtn">◀ 上一个</button>
                <button class="btn btn-outline" id="nextBtn">下一个 ▶</button>
            </div>
            <div class="action-buttons">
                <button class="btn" id="knowBtn" style="background: #10b981;">✓ 认识</button>
                <button class="btn btn-danger" id="dontKnowBtn">✗ 不懂</button>
            </div>
            <div class="footer-actions">
                <button class="btn btn-sm btn-secondary" id="resetUnfamiliarBtn">🔄 清除所有“不懂”标记</button>
                <span style="font-size: 12px; color: #64748b;">标记“不懂”的词根会重点同步</span>
            </div>
        </div>
    </div>
</div>

    // 全局状态

    // DOM 元素
    const homeView = document.getElementById('homeView');
    const studyView = document.getElementById('studyView');
    const cardContent = document.getElementById('cardContent');
    const searchInput = document.getElementById('searchInput');
    const exportSeqArea = document.getElementById('exportSequenceArea');
    const statInfoSpan = document.getElementById('statInfo');

    // 辅助: 更新导出区域和统计
    function updateUnfamiliarUI() {
        const seq = Array.from(unfamiliarSet).join(',');
        exportSeqArea.value = seq;
        statInfoSpan.innerText = `📊 当前不懂词根数量: ${unfamiliarSet.size}`;
    }

    // 保存不懂标记至localStorage
    function persistUnfamiliar() {
        localStorage.setItem('root_unfamiliar_seq', Array.from(unfamiliarSet).join(','));
        updateUnfamiliarUI();
    }

    // 加载本地不懂标记
    function loadUnfamiliarFromLocal() {
        const saved = localStorage.getItem('root_unfamiliar_seq');
        if (saved && saved.trim() !== "") {
            const ids = saved.split(',').map(Number).filter(n => !isNaN(n));
            unfamiliarSet = new Set(ids);
        } else {
            unfamiliarSet = new Set();
        }
        updateUnfamiliarUI();
    }

    // 导入序列（跨设备恢复）
    function importSequence(seqStr) {
        if (!seqStr.trim()) return;
        const ids = seqStr.split(',').map(Number).filter(n => !isNaN(n) && rootsData.some(r => r.id === n));
        unfamiliarSet = new Set(ids);
        persistUnfamiliar();
        alert(`已导入 ${unfamiliarSet.size} 个“不懂”标记`);
    }

    // 生成卡片html
    function renderCardById(rootId) {
        const item = rootsData.find(r => r.id === rootId);
        if (!item) return "<div>词根不存在</div>";
        const examplesHtml = item.examples.map(ex => `<li><span class="example-word">${ex.word}</span><span class="example-trans"> — ${ex.trans}</span></li>`).join('');
        return `
            <div>
                <div class="root-word">${item.root}</div>
                <div class="meaning">🇨🇳 ${item.meaning_cn} &nbsp;|&nbsp; 🇬🇧 ${item.meaning_en}</div>
                <div class="origin">📜 来源: ${item.origin} | 章节 ${item.chapter}</div>
                <div class="example-title">📚 书中示例单词：</div>
                <ul class="example-list">${examplesHtml || '<li>无示例</li>'}</ul>
                <div style="margin-top: 16px; font-size: 0.8rem; color:#3b82f6;">⭐ 点击“不懂”会加入复习序列</div>
            </div>
        `;
    }

    function updateCard() {
        if (!currentStudyList.length || currentIndex >= currentStudyList.length) return;
        const rid = currentStudyList[currentIndex];
        cardContent.innerHTML = renderCardById(rid);
        document.getElementById('studyProgress').innerText = `📖 第${currentIndex+1}/${currentStudyList.length} 个词根`;
    }

    // 构建学习列表
    function buildStudyList(mode, chapterFilter = null) {
        let list = [...rootsData];
        if (mode === 'chapter' && chapterFilter) {
            list = list.filter(r => r.chapter === chapterFilter);
        } else if (mode === 'chapter') {
            // 按章节数字排序
            list.sort((a,b) => {
                if (a.chapter === b.chapter) return a.id - b.id;
                return (a.chapter.localeCompare(b.chapter));
            });
        } else { // random
            list = [...rootsData];
            for (let i = list.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [list[i], list[j]] = [list[j], list[i]];
            }
        }
        return list.map(r => r.id);
    }

    function startStudy(mode) {
        studyMode = mode;
        if (mode === 'chapter') {
            currentStudyList = buildStudyList('chapter');
        } else {
            currentStudyList = buildStudyList('random');
        }
        currentIndex = 0;
        if (currentStudyList.length === 0) {
            alert("无词根数据");
            return;
        }
        homeView.style.display = 'none';
        studyView.style.display = 'block';
        updateCard();
    }

    // 搜索功能
    function performSearch() {
        const keyword = searchInput.value.trim().toLowerCase();
        if (keyword === "") {
            alert("请输入搜索关键词");
            return;
        }
        const matched = rootsData.filter(r => 
            r.root.toLowerCase().includes(keyword) || 
            r.meaning_cn.includes(keyword) || 
            r.meaning_en.toLowerCase().includes(keyword) ||
            r.examples.some(ex => ex.word.toLowerCase().includes(keyword) || ex.trans.includes(keyword))
        );
        if (matched.length === 0) {
            alert("未找到匹配词根");
            return;
        }
        currentStudyList = matched.map(r => r.id);
        currentIndex = 0;
        homeView.style.display = 'none';
        studyView.style.display = 'block';
        updateCard();
    }

    // 不懂/认识逻辑
    function markAsKnow() {
        if (!currentStudyList.length) return;
        const rid = currentStudyList[currentIndex];
        if (unfamiliarSet.has(rid)) {
            unfamiliarSet.delete(rid);
            persistUnfamiliar();
        }
        // 移到下一个
        if (currentIndex + 1 < currentStudyList.length) {
            currentIndex++;
            updateCard();
        } else {
            alert("🎉 恭喜！已学完当前列表所有词根！");
        }
    }

    function markAsDontKnow() {
        if (!currentStudyList.length) return;
        const rid = currentStudyList[currentIndex];
        unfamiliarSet.add(rid);
        persistUnfamiliar();
        if (currentIndex + 1 < currentStudyList.length) {
            currentIndex++;
            updateCard();
        } else {
            alert("已学完本轮，不懂的词根已标记，可导出序列");
        }
    }

    function resetUnfamiliar() {
        if (confirm("清除所有“不懂”标记？不会影响词库数据。")) {
            unfamiliarSet.clear();
            persistUnfamiliar();
            alert("已重置");
        }
    }

    // 初始化事件绑定
    function bindEvents() {
        document.getElementById('startBtn').onclick = () => startStudy(studyMode);
        document.getElementById('modeChapterBtn').onclick = () => { studyMode = 'chapter'; document.querySelectorAll('.mode-btn').forEach(btn=>btn.classList.remove('active')); document.getElementById('modeChapterBtn').classList.add('active'); };
        document.getElementById('modeRandomBtn').onclick = () => { studyMode = 'random'; document.querySelectorAll('.mode-btn').forEach(btn=>btn.classList.remove('active')); document.getElementById('modeRandomBtn').classList.add('active'); };
        document.getElementById('searchBtn').onclick = performSearch;
        document.getElementById('backHomeBtn').onclick = () => { homeView.style.display = 'block'; studyView.style.display = 'none'; };
        document.getElementById('prevBtn').onclick = () => { if(currentIndex > 0) { currentIndex--; updateCard(); } };
        document.getElementById('nextBtn').onclick = () => { if(currentIndex+1 < currentStudyList.length) { currentIndex++; updateCard(); } };
        document.getElementById('knowBtn').onclick = markAsKnow;
        document.getElementById('dontKnowBtn').onclick = markAsDontKnow;
        document.getElementById('resetUnfamiliarBtn').onclick = resetUnfamiliar;
        document.getElementById('copySeqBtn').onclick = () => { exportSeqArea.select(); document.execCommand('copy'); alert("序列已复制"); };
        document.getElementById('importSeqBtn').onclick = () => { const val = document.getElementById('importSeqInput').value; importSequence(val); document.getElementById('importSeqInput').value = ''; };
        // 回车搜索
        searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });
    }

    // 初始化
    function init() {
        bindEvents();
        loadUnfamiliarFromLocal();
        // 默认章节模式
        studyMode = 'chapter';
        document.getElementById('modeChapterBtn').classList.add('active');
    }
    init();
</script>
</body>
</html>
