<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精准复刻答题卡生成器</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #ffffff;
    padding: 20px;
}

/* ========== 1. 用户输入面板 ========== */
.input-panel {
    max-width: 600px;
    margin: 0 auto 30px;
    padding: 25px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
}
.input-item {
    margin-bottom: 15px;
}
.input-item label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}
.input-item input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
}
.btn-generate {
    width: 100%;
    padding: 12px;
    background: #d93025;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
}
.btn-pdf {
    width: 100%;
    padding: 12px;
    background: #28a745;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    display: none;
}

/* ========== 2. 答题卡主体（A4尺寸 210×297mm） ========== */
.answer-card {
    width: 210mm;
    min-height: 297mm;
    background: #ffffff;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
}

/* ========== 定位块 铁则 ========== */
/* 四角大定位块（长方形、放大） */
.corner-mark {
    position: absolute;
    width: 7mm;
    height: 3mm;
    background: #000;
}
.tl { top: 2mm; left: 2mm; }
.tr { top: 2mm; right: 2mm; }
.bl { bottom: 2mm; left: 2mm; }
.br { bottom: 2mm; right: 2mm; }
/* 顶部横向定位块 31个 */
.top-mark-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2mm;
    padding: 2mm 0;
}
.top-mark {
    width: 4.5mm;
    height: 2mm;
    background: #000;
}

/* ========== 标题区 两行统一18pt字号 ========== */
.main-title {
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 18pt;
    color: #d93025;
    text-align: center;
    margin: 6mm 0 3mm;
    font-weight: normal;
}
.sub-title {
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 18pt;
    color: #000000;
    text-align: center;
    margin-bottom: 10mm;
    font-weight: normal;
}

/* ========== 姓名+准考证 铁则 ========== */
.info-line {
    display: flex;
    align-items: center;
    margin: 0 10mm 10mm;
    font-family: "SimSun", "宋体", serif;
    font-size: 12pt;
}
.name-text {
    margin-right: 4mm;
}
.name-line {
    width: 45mm;
    height: 1px;
    background: #d93025;
    margin-right: 12mm;
}
.zk-text {
    margin-right: 4mm;
}
/* 准考证无缝表格，高度严格1.4倍 */
.zk-table {
    border-collapse: collapse;
}
.zk-table td {
    width: 5mm;
    height: 5.6mm; /* 严格1.4倍 */
    border: 1px solid #d93025;
}

/* ========== 注意事项+条形码 铁则 ========== */
.note-barcode-wrap {
    display: flex;
    justify-content: space-between;
    margin: 0 10mm 12mm;
    align-items: center;
    gap: 5mm;
}
/* 注意事项2×2合并表格 */
.note-table {
    border-collapse: collapse;
    border: 1px solid #d93025;
    width: 140mm;
}
.note-table td {
    border: 1px solid #d93025;
    vertical-align: top;
}
.note-left-cell {
    writing-mode: vertical-rl;
    color: #d93025;
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 12pt;
    padding: 4mm 2mm;
    letter-spacing: 2mm;
    width: 8mm;
}
.note-content-cell {
    padding: 3mm;
    font-family: "SimSun", "宋体", serif;
    font-size: 10pt;
    line-height: 1.5;
    color: #d93025;
}
.note-check-cell {
    padding: 2mm 3mm;
    font-family: "SimSun", "宋体", serif;
    font-size: 10pt;
    color: #d93025;
}
/* 缺考方框：与填涂框同比例 */
.note-check-box {
    display: inline-block;
    width: 4.5mm;
    height: 2.7mm;
    border: 1px solid #d93025;
    margin-right: 2mm;
    vertical-align: middle;
}
/* 条形码框 */
.barcode-box {
    width: 50mm;
    height: 25mm;
    border: 1px dashed #d93025;
    border-radius: 3mm;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 3mm;
}
.barcode-title {
    font-family: "SimSun", "宋体", serif;
    font-size: 16pt;
    color: #d93025;
    margin-bottom: 2mm;
}
.barcode-tip {
    font-family: "SimSun", "宋体", serif;
    font-size: 9pt;
    color: #d93025;
    white-space: nowrap;
}

/* ========== 选择题区域 铁则 ========== */
.choice-wrap {
    position: relative;
    margin: 0 10mm;
}
/* 左侧纵向定位块：和ABCD严格居中对齐 */
.left-mark-outer {
    position: absolute;
    left: -6mm;
    top: 5.5mm;
}
.left-mark {
    width: 4mm;
    height: 2mm;
    background: #000;
    margin-bottom: 1.5mm;
}
/* 外层红圆角框 */
.choice-outer {
    border: 1px solid #d93025;
    border-radius: 4mm;
    padding: 3mm;
}
/* 选择题标题+提示 */
.choice-header {
    display: flex;
    align-items: center;
    margin-bottom: 2.5mm;
}
.choice-title {
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 14pt;
    color: #d93025;
    margin-right: 3mm;
}
.choice-tip {
    font-family: "SimSun", "宋体", serif;
    font-size: 10pt;
    flex: 1;
    color: #d93025;
}
.choice-example-block {
    width: 4.5mm;
    height: 2.7mm;
    background: #000000;
    display: inline-block;
    vertical-align: middle;
}
/* 内层黑框 */
.choice-inner {
    border: 1px solid #000000;
    padding: 2.5mm;
}
/* 填涂区整体布局 */
.choice-content-wrap {
    display: flex;
    align-items: flex-start;
    gap: 0;
    flex-wrap: wrap;
}
/* 单列结构 */
.choice-col {
    display: flex;
    flex-direction: column;
    gap: 2.2mm;
}
/* 题号行：核心对齐——每个数字与下方填涂框中心精准对齐 */
.num-row {
    display: flex;
    gap: 1.2mm;
    justify-content: center;
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 10pt;
    color: #000000;
}
.num-item {
    width: 4.5mm;
    text-align: center;
}
/* 选项行 */
.opt-row {
    display: flex;
    gap: 1.2mm;
}
/* 填涂框：宽高严格5:3 */
.opt-box {
    width: 4.5mm;
    height: 2.7mm;
    border: 1px solid #d93025;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 7.5pt;
    color: #d93025;
}
/* 组间空距：严格1个填涂框完整宽度 */
.choice-gap {
    width: 4.5mm;
}
/* 右侧填涂示例 */
.right-example-group {
    display: flex;
    flex-direction: column;
    gap: 3mm;
    margin-left: 8mm;
}
.example-item {
    width: 4.5mm;
    height: 2.7mm;
}
.ex-correct { background: #d93025; }
.ex-half { background: #cccccc; }
.ex-wrong { background: #333333; }
</style>
</head>
<body>

<!-- 输入面板 -->
<div class="input-panel">
    <h2 class="text-xl font-bold mb-5 text-center">答题卡生成器（精准复刻版）</h2>
    <div class="input-item">
        <label>答题卡标题</label>
        <input type="text" id="cardTitle" value="2026年普通高等学校招生全国统一考试模拟试卷">
    </div>
    <div class="input-item">
        <label>考试学科</label>
        <input type="text" id="cardSubject" value="数学">
    </div>
    <div class="input-item">
        <label>准考证号位数</label>
        <input type="number" id="zkLength" value="8" min="4" max="12">
    </div>
    <div class="input-item">
        <label>选择题数量</label>
        <input type="number" id="choiceTotal" value="27" min="1" max="50">
    </div>
    <button class="btn-generate" id="genBtn">生成答题卡</button>
    <button class="btn-pdf" id="pdfBtn">导出PDF</button>
</div>

<!-- 答题卡预览容器 -->
<div id="cardContainer"></div>

<script>
// 获取元素
const genBtn = document.getElementById('genBtn');
const pdfBtn = document.getElementById('pdfBtn');
const cardContainer = document.getElementById('cardContainer');

// 生成答题卡
genBtn.addEventListener('click', () => {
    const title = document.getElementById('cardTitle').value;
    const subject = document.getElementById('cardSubject').value;
    const zkLen = Number(document.getElementById('zkLength').value);
    const choiceTotal = Number(document.getElementById('choiceTotal').value);

    // ========== 1. 生成准考证框 ==========
    let zkHtml = '';
    for(let i=0; i<zkLen; i++) zkHtml += '<td></td>';

    // ========== 2. 选择题规则 ==========
    // 5题一组，一行最多4组(20题)，超了自动换行
    const GROUP_SIZE = 5;
    const MAX_GROUP_PER_LINE = 4;

    // 分组：余数1、2合并上一组
    function splitChoice(total) {
        const arr = [];
        let cur = 1;
        while(cur <= total) {
            const left = total - cur + 1;
            if(left <= 2 && arr.length > 0) {
                arr[arr.length - 1].end = total;
                break;
            }
            const end = Math.min(cur + GROUP_SIZE - 1, total);
            arr.push({start: cur, end: end});
            cur = end + 1;
        }
        return arr;
    }

    // 分组拆成行，每行最多4组
    const groups = splitChoice(choiceTotal);
    const lineGroups = [];
    let tempLine = [];
    groups.forEach(g=>{
        if(tempLine.length >= MAX_GROUP_PER_LINE){
            lineGroups.push(tempLine);
            tempLine = [g];
        }else{
            tempLine.push(g);
        }
    });
    if(tempLine.length) lineGroups.push(tempLine);

    // 生成选择题HTML
    let choiceHtml = '';
    lineGroups.forEach(line=>{
        line.forEach((g, idx)=>{
            let numRow = '<div class="num-row">';
            for(let i=g.start; i<=g.end; i++){
                numRow += `<div class="num-item">${i}</div>`;
            }
            numRow += '</div>';

            let aRow='',bRow='',cRow='',dRow='';
            for(let i=g.start; i<=g.end; i++){
                aRow += '<div class="opt-box">A</div>';
                bRow += '<div class="opt-box">B</div>';
                cRow += '<div class="opt-box">C</div>';
                dRow += '<div class="opt-box">D</div>';
            }
            aRow = `<div class="opt-row">${aRow}</div>`;
            bRow = `<div class="opt-row">${bRow}</div>`;
            cRow = `<div class="opt-row">${cRow}</div>`;
            dRow = `<div class="opt-row">${dRow}</div>`;

            choiceHtml += `
                <div class="choice-col">
                    ${numRow}${aRow}${bRow}${cRow}${dRow}
                </div>
            `;
            // 组间间隔
            if(idx < line.length - 1){
                choiceHtml += `<div class="choice-gap"></div>`;
            }
        });
        // 每行结束换行
        choiceHtml += `<div style="width:100%;height:3mm;"></div>`;
    });

    // ========== 3. 完整答题卡HTML ==========
    const cardHtml = `
    <div class="answer-card" id="pdfTarget">
        <!-- 四角大定位块 -->
        <div class="corner-mark tl"></div>
        <div class="corner-mark tr"></div>
        <div class="corner-mark bl"></div>
        <div class="corner-mark br"></div>

        <!-- 顶部横向定位块31个 -->
        <div class="top-mark-container">
            ${Array(31).fill('<div class="top-mark"></div>').join('')}
        </div>

        <!-- 标题 -->
        <div class="main-title">${title}</div>
        <div class="sub-title">${subject}答题卡</div>

        <!-- 姓名+准考证 -->
        <div class="info-line">
            <span class="name-text">姓名：</span>
            <div class="name-line"></div>
            <span class="zk-text">准考证号</span>
            <table class="zk-table"><tr>${zkHtml}</tr></table>
        </div>

        <!-- 注意事项+条形码 -->
        <div class="note-barcode-wrap">
            <table class="note-table">
                <tr>
                    <td rowspan="2" class="note-left-cell">注意事项</td>
                    <td class="note-content-cell">
                        1.答题前，考生先填写好自己的姓名、准考证号，并认真核对条形码上的姓名、准考证号、考室和座位号；<br>
                        2.在草稿纸、试题卷上答题无效；<br>
                        3.答题时，请考生注意各题号后面的答题提示；<br>
                        4.请勿折叠答题卡，保持字体工整、笔迹清晰、卡面清洁。
                    </td>
                </tr>
                <tr>
                    <td class="note-check-cell">
                        <span class="note-check-box"></span>← 此方框为缺考考生标记，由监考员用2B铅笔填涂
                    </td>
                </tr>
            </table>
            <div class="barcode-box">
                <div class="barcode-title">贴条形码区</div>
                <div class="barcode-tip">(正面朝上，切勿贴出虚线方框)</div>
            </div>
        </div>

        <!-- 选择题区域 -->
        <div class="choice-wrap">
            <div class="left-mark-outer">
                <div class="left-mark"></div>
                <div class="left-mark"></div>
                <div class="left-mark"></div>
                <div class="left-mark"></div>
            </div>
            <div class="choice-outer">
                <div class="choice-header">
                    <span class="choice-title">选择题</span>
                    <span class="choice-tip">(提示:请用2B铅笔在正确答案上填涂，修改时只能用橡皮擦干净，不留痕迹。正确填涂示例：<span class="choice-example-block"></span>)</span>
                </div>
                <div class="choice-inner">
                    <div class="choice-content-wrap">
                        ${choiceHtml}
                        <!-- 右侧示例 -->
                        <div class="right-example-group">
                            <div class="example-item ex-correct"></div>
                            <div class="example-item ex-half"></div>
                            <div class="example-item ex-wrong"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    `;

    // 渲染
    cardContainer.innerHTML = cardHtml;
    pdfBtn.style.display = 'block';
});

// 导出PDF
pdfBtn.addEventListener('click', () => {
    const target = document.getElementById('pdfTarget');
    html2pdf().set({
        margin: 0,
        filename: '答题卡.pdf',
        image: {type:'image/png', quality:1},
        html2canvas: {scale:3},
        jsPDF: {unit:'mm', format:'a4', orientation:'portrait'}
    }).from(target).save();
});
</script>

</body>
</html>
