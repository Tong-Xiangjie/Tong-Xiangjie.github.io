<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标准答题卡生成器（格点精确对齐版）</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
/* ================================================
   答题卡样式 - 所有可调参数都已用注释标出
   修改数值即可调整布局，无需改动其他代码
   ============================================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #e2e8f0;
    padding: 20px;
}

/* ---------- 用户输入面板样式（无需调整）---------- */
.input-panel {
    max-width: 640px;
    margin: 0 auto 30px;
    padding: 24px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}
.input-item {
    margin-bottom: 16px;
}
.input-item label {
    display: block;
    margin-bottom: 6px;
    font-weight: 700;
    color: #1e293b;
}
.input-item input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 14px;
}
.btn-generate {
    width: 100%;
    padding: 12px;
    background: #d93025;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    font-weight: 700;
}
.btn-pdf {
    width: 100%;
    padding: 12px;
    background: #166534;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    display: none;
    font-weight: 700;
}

/* ================================================
   答题卡主体 - 核心参数区域
   修改下面带 🔧 标记的数值即可调整整体布局
   ============================================== */
.answer-card {
    width: 210mm;
    min-height: 297mm;
    background: #ffffff;
    margin: 0 auto;
    position: relative;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    
    /* 🔧 可调参数 1：纸张四周边距（单位 mm）*/
    --page-top: 13mm;        /* 上边距 - 调大则标题和定位块下移 */
    --page-bottom: 13mm;     /* 下边距 - 调大则底部留白增加 */
    --page-left: 10mm;       /* 左边距 - 调大则所有内容右移 */
    --page-right: 10mm;      /* 右边距 - 调大则所有内容左移 */
    
    /* 🔧 可调参数 2：定位块和填涂框尺寸（单位 mm）*/
    --block-width: 4.5mm;    /* 黑色方块宽度 - 调大则所有填涂框变宽 */
    --block-height: 3.375mm; /* 黑色方块高度 - 自动按 4:3 比例，无需调整 */
    --block-step: 6.5mm;     /* 相邻方块中心距 - 调大则选择题列间距变大 */
}

/* ================================================
   四角定位块
   🔧 可调参数 36：四角大定位块的样式
   ============================================== */
.corner-mark {
    position: absolute;
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 4);
    /* 🔧 可调参数 36a：四角定位块颜色 */
    background: #000;        /* 可改成其他颜色，如 #333、#d93025 */
}
/* 🔧 可调参数 36b：四角定位块位置（跟随页边距，一般无需调整）*/
.tl { top: var(--page-top); left: var(--page-left); }
.tr { top: var(--page-top); right: var(--page-right); }
.bl { bottom: var(--page-bottom); left: var(--page-left); }
.br { bottom: var(--page-bottom); right: var(--page-right); }

/* ================================================
   顶部31个横向定位块
   🔧 可调参数 37：顶部定位块的样式和间距
   ============================================== */
.top-mark-container {
    position: absolute;
    top: var(--page-top);
    left: calc(var(--page-left) + var(--block-width) + 1mm);
    right: calc(var(--page-right) + var(--block-width) + 1mm);
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: var(--block-height);
}
/* 🔧 可调参数 37a：顶部每个小方块的大小 */
.top-mark {
    width: var(--block-width);
    height: calc(var(--block-width) * 2 / 4);
    /* 🔧 可调参数 37b：顶部方块颜色 */
    background: #000;        /* 可改成其他颜色 */
}
/* 🔧 可调参数 37c：顶部方块数量 - 如需改变数量，修改 Array(31) 中的数字 */
/* 注意：数量改变后，左右边距可能需要重新计算以保持均匀分布 */

/* ================================================
   标题区样式
   🔧 可调参数 38：标题之间的行间距
   ============================================== */
.title-section {
    position: relative;
    z-index: 2;
    /* 🔧 可调参数 3：标题区顶部留白（避开顶部定位块）*/
    padding-top: 18mm;       /* 调大则标题下移，调小则标题上移 */
}
/* 🔧 可调参数 4：主标题样式 */
.main-title {
    font-family: "SimHei", "黑体", sans-serif;  /* 可改字体 */
    font-size: 18pt;          /* 字号 - 调大则标题变大 */
    color: #d93025;           /* 颜色 - 可改为其他红色值 */
    text-align: center;
    /* 🔧 可调参数 38a：主标题与副标题之间的行间距 */
    margin-bottom: 0.3mm;       /* 调大则标题和副标题距离变大 */
    font-weight: normal;
}
/* 🔧 可调参数 5：副标题样式 */
.sub-title {
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 18pt;          /* 字号 */
    color: #000000;           /* 颜色 - 黑色 */
    text-align: center;
    /* 🔧 可调参数 38b：副标题与下方信息区的间距 */
    margin-bottom: 3mm;       /* 调大则副标题与姓名行距离变大 */
    font-weight: normal;
}

/* ================================================
   考生信息区（姓名 + 准考证号）
   ============================================== */
.info-section {
    margin: 0 var(--page-left) 10mm var(--page-left);
}
.info-line {
    display: flex;
    align-items: center;
    font-family: "SimSun", "宋体", serif;
    /* 🔧 可调参数 6：考生信息文字大小 */
    font-size: 12pt;          /* 调大则姓名/准考证字变大 */
    gap: 4mm;
}
.name-text { font-weight: 500; }
/* 🔧 可调参数 7：姓名下划线样式 */
.name-line {
    width: 45mm;              /* 横线长度 */
    height: 0.8px;              /* 线条粗细 */
    background: #d93025;
    /* ===== 关键修复：让线条底部对齐 ===== */
    align-self: flex-end;     /* 在 flex 容器中底部对齐 */
    margin-bottom: 3px;       /* 微调垂直位置，调大则线条下移 */
}
.zk-text { margin-left: 12mm; font-weight: 500; }
.zk-table {
    border-collapse: collapse;
}
/* 🔧 可调参数 8：准考证号每个格子的大小 */
.zk-table td {
    width: 7mm;               /* 格子宽度 - 调大则格子变宽 */
    height: 8mm;              /* 格子高度 - 调大则格子变高 */
    border: 1px solid #d93025;
}

/* ================================================
   注意事项区 + 条形码区
   🔧 可调参数 39：注意事项表格的各种参数
   ============================================== */
/* 🔧 可调参数 44：注意事项区与上方信息区的间距 */
.note-section {
    display: flex;
    justify-content: space-between;
    margin: -5mm var(--page-left) 12mm var(--page-left);
    /*       ↑
         从 0 改为 3mm，间距调小了
         如果想更小，可以改为 1mm 或 2mm
         如果想更大，改为 5mm 或 8mm
    */
    gap: 5mm;
}
.note-table {
    border-collapse: collapse;
    /* 🔧 可调参数 39a：注意事项表格外边框颜色和粗细 */
    border: 1px solid #d93025;
    width: 140mm;
}
.note-table td {
    /* 🔧 可调参数 39b：表格内部边框颜色和粗细 */
    border: 1px solid #d93025;
    vertical-align: top;
}
/* 🔧 可调参数 9：“注意事项”左侧竖排文字样式 */
.note-left-cell {
    writing-mode: vertical-rl;
    /* 🔧 可调参数 39c：左侧文字颜色 */
    color: #d93025;
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 12pt;          /* 字体大小 */
    /* 🔧 可调参数 39d：单元格内边距 */
    padding: 0mm 0mm;         /* 上下内边距 左右内边距 */
    letter-spacing: 2mm;      /* 字间距 - 调大则“注意事项”四个字间距变大 */
    width: 8mm;               /* 左侧栏宽度 */
    text-align: center;
}
/* 🔧 可调参数 10：注意事项正文样式 */
.note-content-cell {
    /* 🔧 可调参数 39e：正文单元格内边距 */
    padding: 3mm;
    font-family: "SimSun", "宋体", serif;
    font-size: 9.5pt;         /* 正文大小 */
    line-height: 1.2;         /* 行高 - 调大则正文行间距变大 */
    color: #d93025;
}
/* 🔧 可调参数 11：缺考标记行样式 */
.note-check-cell {
    /* 🔧 可调参数 39f：缺考标记行内边距 */
    padding: 0mm 3mm;
    font-family: "SimSun", "宋体", serif;
    font-size: 9.5pt;
    color: #d93025;
}
/* 🔧 可调参数 39g：缺考标记方框样式（跟随全局方块宽度，一般无需单独调整）*/
.note-check-box {
    display: inline-block;
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 5);
    border: 1px solid #d93025;
    margin-right: 2mm;
    vertical-align: middle;
}
/* 🔧 可调参数 12：条形码框样式 */
.barcode-box {
    width: 63mm;              /* 条形码框宽度 */
    height: 25mm;             /* 条形码框高度 */
    /* 🔧 可调参数 39h：条形码边框样式 */
    border: 1px dashed #d93025;
    border-radius: 3mm;       /* 圆角大小 - 调大则边框更圆 */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #ffffff;
}
/* 🔧 可调参数 13：条形码区文字样式 */
.barcode-title {
    font-family: "SimSun", "宋体", serif;
    font-size: 14pt;          /* “贴条形码区”字体大小 */
    color: #d93025;
}
.barcode-tip {
    font-family: "SimSun", "宋体", serif;
    font-size: 8pt;           /* 提示文字大小 */
    color: #d93025;
}

/* ================================================
   选择题区域
   ============================================== */
/* 🔧 可调参数 46：选择题区与上方注意事项区的间距 */
.choice-section {
    position: relative;
    margin: -8mm var(--page-left) 0 var(--page-left);
    /*       ↑
         这个值控制选择题框与注意事项区的间距
         调大（如 10mm）→ 间距变大
         调小（如 0mm）→ 间距变小
    */
}

/* ---------- 左侧纵向定位块 ---------- */
.left-marks-container {
    position: absolute;
    /* 🔧 可调参数 14：左侧纵向方块向左偏移距离 */
    left: -6mm;               /* 调大则方块左移，调小则右移 */
    top: 0;
    display: flex;
    flex-direction: column;
}
.left-mark {
    width: var(--block-width);
    height: calc(var(--block-width) * 2 / 4);
    /* 🔧 可调参数 40：左侧纵向定位块颜色 */
    background: #000;
    /* 🔧 可调参数 15：左侧纵向方块之间的垂直间距 */
    margin-bottom: 2.2mm;     /* 应与下方 .choice-col 的 gap 保持一致 */
}

/* ---------- 选择题外框 ---------- */
/* 🔧 可调参数 16：选择题红色外框样式 */
.choice-outer {
    /* 🔧 可调参数 41：外框边框颜色和粗细 */
    border: 1px solid #d93025;
    /* 🔧 可调参数 16a：外框圆角大小 - 调大则边框更圆 */
    border-radius: 3mm;
    /* 🔧 可调参数 17：外框内边距（影响横向对齐位置，也影响标题行与顶部距离）*/
    /*    四个值顺序：上 右 下 左 */
    padding: 1.5mm 1.5mm 2mm 1.5mm;             /* 统一内边距，调大会让选择题内容整体右移下移 */
    /*    如需单独控制顶部间距，可改为：padding: 2mm 3mm 3mm 3mm; */
    background: white;
}

/* 🔧 可调参数 48：标题行（选择题+提示）样式 - 控制标题行与填涂区的垂直间距 */
.choice-header {
    display: flex;
    align-items: center;
    gap: 8px;
    /* 🔧 可调参数 48a：标题行与下方填涂区的间距 */
    margin-bottom: 0mm;      /* 调大（如 5mm）→ 标题与填涂区距离变大 */
    /*                       调小（如 1mm）→ 标题与填涂区距离变小 */
    /* 🔧 可调参数 48b：标题行与红色外框顶部的间距（微调用）*/
    margin-top: 0;             /* 调大（正值）则标题下移，调小（负值）则标题上移 */
}

/* 🔧 可调参数 18：“选择题”标题样式 */
.choice-title {
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 12pt;          /* 标题大小 */
    color: #d93025;
}
/* 🔧 可调参数 19：提示文字样式 */
.choice-tip {
    font-family: "SimSun", "宋体", serif;
    font-size: 9pt;           /* 提示文字大小 */
    color: #d93025;
}
.choice-example-block {
    display: inline-block;
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 5);
    background: #000;
    vertical-align: middle;
    margin-left: 2px;
}
/* 🔧 可调参数 20：黑色内框内边距 */
.choice-inner {
    /* 🔧 可调参数 42：内框边框颜色和粗细 */
    border: 1px solid #000;
    /* 🔧 可调参数 21：内框内边距（影响横向对齐位置）*/
    padding: 2.5mm;           /* 调大会让选择题内容整体右移下移 */
    background: white;
}
.choice-content-wrap {
    display: flex;
    align-items: flex-start;
    gap: 0;
    flex-wrap: wrap;
}

/* ---------- 每一列（每道题）的样式 ---------- */
.choice-col {
    display: flex;
    flex-direction: column;
    /* 🔧 可调参数 22：行与行之间的垂直间距（题号与A、A与B等）*/
    gap: 2.2mm;               /* 调大则行间距变大 */
    flex-shrink: 0;
    width: var(--block-step);
}
.num-row, .opt-row {
    display: flex;
    gap: 0;
    justify-content: space-between;
}
/* 🔧 可调参数 23：题号数字样式 */
.num-item {
    width: var(--block-width);
    text-align: center;
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 9.5pt;         /* 数字大小 */
    color: #000;
    font-weight: 500;
}
/* 🔧 可调参数 24：选项框内字母样式 */
.opt-box {
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 5);
    border: 1px solid #d93025;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 7.5pt;         /* ABCD 字母大小 */
    color: #d93025;
    background: white;
}

/* ---------- 隐形占位列（用于组间对齐，无需调整）---------- */
.opt-box-invisible {
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 5);
    border: 1px solid #ffffff;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 7.5pt;
    color: #ffffff;
}
.invisible-num-cell {
    width: var(--block-width);
    text-align: center;
    color: #ffffff;
    background: #ffffff;
    font-size: 9.5pt;
}

/* ---------- 右侧填涂示例 ---------- */
.right-example-group {
    display: flex;
    flex-direction: column;
    /* 🔧 可调参数 25：右侧示例方块之间的间距 */
    gap: 3mm;
    /* 🔧 可调参数 26：右侧示例与选择题列的间距 */
    margin-left: 8mm;
}
.example-item {
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 5);
}
/* 🔧 可调参数 43：右侧示例方块的颜色 */
.ex-correct { background: #d93025; }   /* 正确填涂示例颜色 */
.ex-half { background: #cccccc; }      /* 半涂示例颜色 */
.ex-wrong { background: #333333; }     /* 错误填涂示例颜色 */

/* ---------- 组间分隔线 ---------- */
.choice-group-spacer {
    width: 100%;
    /* 🔧 可调参数 27：两组选择题之间的间距 */
    height: 2.5mm;
}
</style>
</head>
<body>

<div class="input-panel">
    <h2 class="text-xl font-bold mb-4 text-center">答题卡生成器（格点精确对齐版）</h2>
    <div class="input-item">
        <label>试卷标题</label>
        <input type="text" id="cardTitle" value="2026年普通高等学校招生全国统一考试">
    </div>
    <div class="input-item">
        <label>考试学科</label>
        <input type="text" id="cardSubject" value="数学">
    </div>
    <div class="input-item">
        <label>准考证号位数</label>
        <input type="number" id="zkLength" value="9" min="4" max="11">
    </div>
    <div class="input-item">
        <label>选择题数量</label>
        <input type="number" id="choiceTotal" value="27" min="1">
    </div>
    <button class="btn-generate" id="genBtn">生成答题卡</button>
    <button class="btn-pdf" id="pdfBtn">导出 PDF</button>
</div>

<div id="cardContainer"></div>

<script>
/* ================================================
   JavaScript 可调参数区
   修改下面的数值即可调整布局和逻辑
   ============================================== */
(function(){
    const genBtn = document.getElementById('genBtn');
    const pdfBtn = document.getElementById('pdfBtn');
    const cardContainer = document.getElementById('cardContainer');

    // ========== 🔧 可调参数 28：选择题布局参数 ==========
    const BLOCK_STEP = 6.5;      // 每一列的宽度(mm) - 必须与 CSS 中的 --block-step 一致
    const PAGE_LEFT = 15;         // 左边距(mm) - 必须与 CSS 中的 --page-left 一致
    const BLOCK_WIDTH = 4.5;      // 方块宽度(mm) - 必须与 CSS 中的 --block-width 一致
    const OUTER_PADDING = 3;      // 外框内边距(mm) - 必须与 CSS 中的 .choice-outer padding 一致
    const INNER_PADDING = 2.5;    // 内框内边距(mm) - 必须与 CSS 中的 .choice-inner padding 一致
    
    // ========== 🔧 可调参数 29：横向对齐微调（最常用！）==========
    // 目标：让第1道选择题的填涂框左边缘对齐到目标方块
    // 如果对不齐，直接修改下面的值，每次增减 0.5 或 1，直到对齐
    //   增大数值 → 选择题整体右移
    //   减小数值 → 选择题整体左移
    const OFFSET_FIX = 0;         // ← 微调值，单位 mm
    
    // ========== 🔧 可调参数 30：对齐到第几个黑色方块 ==========
    // 0=第1个, 1=第2个, 2=第3个（默认）
    // 注意：您测试发现 -1 最齐，说明浏览器渲染有偏移，保持当前值即可
    const TARGET_BLOCK_INDEX = -1; // 当前经过实测最齐的值
    
    // ========== 🔧 可调参数 31：每行最多放几组 ==========
    const MAX_GROUP_PER_LINE = 4;  // 默认每行4组=20题，可改为 3 或 5
    
    // ========== 🔧 可调参数 32：每组包含几道题 ==========
    const GROUP_SIZE = 5;         // 默认每组5题，可改为 4 或 6
    
    // ========== 🔧 可调参数 33：大行之间的间距 ==========
    const LINE_GAP = 3;           // 单位 mm，两组大行之间的间距
    
    // ========== 🔧 可调参数 34：右侧示例方块参数 ==========
    const RIGHT_EXAMPLE_GAP = 3;   // 示例方块之间间距(mm)
    const RIGHT_EXAMPLE_MARGIN = 8; // 示例方块与选择题列的间距(mm)
    
    // ========== 🔧 可调参数 35：左侧纵向方块间距 ==========
    // 此值已由 CSS 控制，JS 只用于计算数量，如需调整请修改 CSS 中的 .left-mark margin-bottom

    // 计算对齐偏移量（一般不需要改，调 OFFSET_FIX 即可）
    function calculateAlignmentOffset() {
        const firstBlockLeft = PAGE_LEFT + BLOCK_WIDTH;
        const targetX = firstBlockLeft + TARGET_BLOCK_INDEX * BLOCK_STEP;
        const totalPadding = OUTER_PADDING + INNER_PADDING;
        return targetX - totalPadding + OFFSET_FIX;
    }

    // 生成单道题的列
    function generateQuestionColumn(questionNumber) {
        return `<div class="choice-col" style="width: ${BLOCK_STEP}mm;">
            <div class="num-row"><div class="num-item">${questionNumber}</div></div>
            <div class="opt-row"><div class="opt-box">A</div></div>
            <div class="opt-row"><div class="opt-box">B</div></div>
            <div class="opt-row"><div class="opt-box">C</div></div>
            <div class="opt-row"><div class="opt-box">D</div></div>
        </div>`;
    }

    // 生成隐形占位列（组间用，保持对齐）
    function generateInvisibleColumn() {
        return `<div class="choice-col invisible-col" style="width: ${BLOCK_STEP}mm;">
            <div class="num-row"><div class="num-item invisible-num-cell"></div></div>
            <div class="opt-row"><div class="opt-box-invisible">A</div></div>
            <div class="opt-row"><div class="opt-box-invisible">B</div></div>
            <div class="opt-row"><div class="opt-box-invisible">C</div></div>
            <div class="opt-row"><div class="opt-box-invisible">D</div></div>
        </div>`;
    }

    // 构建选择题网格
    function buildChoiceGrid(choiceTotal) {
        let groups = [];
        for(let start = 1; start <= choiceTotal; start += GROUP_SIZE) {
            let end = Math.min(start + GROUP_SIZE - 1, choiceTotal);
            let questions = [];
            for(let q = start; q <= end; q++) questions.push(q);
            groups.push({ start, end, questions });
        }
        
        let lines = [];
        let currentLine = [];
        for(let g of groups) {
            if(currentLine.length >= MAX_GROUP_PER_LINE) {
                lines.push(currentLine);
                currentLine = [g];
            } else {
                currentLine.push(g);
            }
        }
        if(currentLine.length) lines.push(currentLine);
        
        let finalHtml = '';
        for(let lineIdx = 0; lineIdx < lines.length; lineIdx++) {
            const lineGroups = lines[lineIdx];
            let rowHtml = '';
            for(let idx = 0; idx < lineGroups.length; idx++) {
                const grp = lineGroups[idx];
                for(let q of grp.questions) {
                    rowHtml += generateQuestionColumn(q);
                }
                // 组间插入隐形列（5题和6题之间、10和11之间...）
                if(idx !== lineGroups.length - 1) {
                    rowHtml += generateInvisibleColumn();
                }
            }
            finalHtml += `<div style="display: flex; gap: 0; margin-bottom: ${lineIdx === lines.length-1 ? '0' : LINE_GAP + 'mm'};">${rowHtml}</div>`;
            if(lineIdx !== lines.length-1) finalHtml += `<div class="choice-group-spacer"></div>`;
        }
        return finalHtml;
    }

    // 生成左侧纵向定位块（数量自动计算）
    function generateLeftMarks(choiceTotal) {
        let groups = [];
        for(let start = 1; start <= choiceTotal; start += GROUP_SIZE) {
            let end = Math.min(start + GROUP_SIZE - 1, choiceTotal);
            groups.push({ start, end });
        }
        
        let lines = [];
        let currentLine = [];
        for(let g of groups) {
            if(currentLine.length >= MAX_GROUP_PER_LINE) {
                lines.push(currentLine);
                currentLine = [g];
            } else {
                currentLine.push(g);
            }
        }
        if(currentLine.length) lines.push(currentLine);
        
        let totalRows = 0;
        for(let li = 0; li < lines.length; li++) {
            const lineGroups = lines[li];
            for(let idx = 0; idx < lineGroups.length; idx++) {
                totalRows += 5;  // 题号行 + A/B/C/D 四行
                if(idx !== lineGroups.length - 1) totalRows += 1;  // 组间分隔行
            }
            if(li !== lines.length - 1) totalRows += 1;  // 行间距
        }
        
        let marksHtml = '';
        for(let i = 0; i < totalRows; i++) {
            marksHtml += `<div class="left-mark"></div>`;
        }
        return `<div class="left-marks-container">${marksHtml}</div>`;
    }

    // 生成准考证表格
    function buildZkTable(zkLen) {
    let cells = '';
    for(let i = 0; i < zkLen; i++) {
        cells += '<td></td>';
    }
    return `<table class="zk-table"><tr>${cells}</tr></table>`;
}

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // 渲染完整答题卡
    function renderCard(title, subject, zkLen, choiceTotal) {
        const zkTableHtml = buildZkTable(zkLen);
        const choiceGridHtml = buildChoiceGrid(choiceTotal);
        const leftMarksHtml = generateLeftMarks(choiceTotal);
        const alignOffset = calculateAlignmentOffset();
        
        // 动态应用右侧示例方块的间距参数
        const rightExampleStyle = `gap: ${RIGHT_EXAMPLE_GAP}mm; margin-left: ${RIGHT_EXAMPLE_MARGIN}mm;`;
        
        return `
        <div class="answer-card" id="pdfTarget">
            <!-- 四角定位块 -->
            <div class="corner-mark tl"></div>
            <div class="corner-mark tr"></div>
            <div class="corner-mark bl"></div>
            <div class="corner-mark br"></div>
            
            <!-- 顶部31个横向定位块 -->
            <div class="top-mark-container">
                ${Array(31).fill('<div class="top-mark"></div>').join('')}
            </div>
            
            <!-- 标题区 -->
            <div class="title-section">
                <div class="main-title">${escapeHtml(title)}</div>
                <div class="sub-title">${escapeHtml(subject)}答题卡</div>
            </div>
            
            <!-- 考生信息区 -->
            <div class="info-section">
                <div class="info-line">
                    <span class="name-text">姓名：</span>
                    <div class="name-line"></div>
                    <span class="zk-text">准考证号</span>
                    ${zkTableHtml}
                </div>
            </div>
            
            <!-- 注意事项区 -->
            <div class="note-section">
                <table class="note-table">
                    <tr>
                        <td rowspan="2" class="note-left-cell">注意事项</td>
                        <td class="note-content-cell">
                            1. 答题前，考生先填写好自己的姓名、准考证号，并认真核对条形码上的姓名、准考证号、考室和座位号；<br>
                            2. 在草稿纸、试题卷上答题无效；<br>
                            3. 答题时，请考生注意各题号后面的答题提示；<br>
                            4. 请勿折叠答题卡，保持字体工整、笔迹清晰、卡面清洁。
                        </td>
                    </tr>
                    <tr>
                        <td class="note-check-cell">
                            <span class="note-check-box"></span> ← 此方框为缺考考生标记，由监考员用2B铅笔填涂
                        </td>
                    </tr>
                </table>
                <div class="barcode-box">
                    <div class="barcode-title">贴条形码区</div>
                    <div class="barcode-tip">(正面朝上，切勿贴出虚线方框)</div>
                </div>
            </div>
            
            <!-- 选择题区 -->
            <div class="choice-section">
                ${leftMarksHtml}
                <div class="choice-outer">
                    <div class="choice-header">
                        <span class="choice-title">选择题</span>
                        <span class="choice-tip">(提示：请用2B铅笔在正确答案上填涂，修改时只能用橡皮擦干净，不留痕迹。正确填涂示例：<span class="choice-example-block"></span>)</span>
                    </div>
                    <div class="choice-inner">
                        <div class="choice-content-wrap" style="margin-left: ${alignOffset}mm;">
                            ${choiceGridHtml}
                            <div class="right-example-group" style="${rightExampleStyle}">
                                <div class="example-item ex-correct"></div>
                                <div class="example-item ex-half"></div>
                                <div class="example-item ex-wrong"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
    }

    // 事件绑定
    genBtn.addEventListener('click', () => {
        const title = document.getElementById('cardTitle').value;
        const subject = document.getElementById('cardSubject').value;
        let zkLen = parseInt(document.getElementById('zkLength').value, 10);
        let choiceTotal = parseInt(document.getElementById('choiceTotal').value, 10);
        if(isNaN(zkLen)) zkLen = 8;
        if(zkLen < 4) zkLen = 4;
        if(zkLen > 12) zkLen = 12;
        if(isNaN(choiceTotal) || choiceTotal < 1) choiceTotal = 1;
        
        cardContainer.innerHTML = renderCard(title, subject, zkLen, choiceTotal);
        pdfBtn.style.display = 'block';
    });
    
    pdfBtn.addEventListener('click', () => {
        const target = document.getElementById('pdfTarget');
        if(!target) return;
        html2pdf().set({
            margin: 0,
            filename: '答题卡.pdf',
            image: { type: 'image/png', quality: 1 },
            html2canvas: { scale: 3, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(target).save();
    });
    
    // 初始加载
    window.addEventListener('DOMContentLoaded', () => {
        const title = document.getElementById('cardTitle').value;
        const subject = document.getElementById('cardSubject').value;
        const zkLen = parseInt(document.getElementById('zkLength').value, 10);
        const choiceTotal = parseInt(document.getElementById('choiceTotal').value, 10);
        cardContainer.innerHTML = renderCard(title, subject, zkLen, choiceTotal);
        pdfBtn.style.display = 'block';
    });
})();
</script>
</body>
</html>
