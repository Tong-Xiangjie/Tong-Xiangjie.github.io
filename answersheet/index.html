<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精准复刻答题卡生成器</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #ffffff;
    padding: 20px;
}

/* ========== 1. 用户输入面板 ========== */
.input-panel {
    max-width: 600px;
    margin: 0 auto 30px;
    padding: 25px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
}
.input-item {
    margin-bottom: 15px;
}
.input-item label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}
.input-item input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
}
.btn-generate {
    width: 100%;
    padding: 12px;
    background: #d93025;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
}
.btn-pdf {
    width: 100%;
    padding: 12px;
    background: #28a745;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    display: none;
}

/* ========== 2. 答题卡主体（A4尺寸 210×297mm） ========== */
.answer-card {
    width: 210mm;
    min-height: 297mm;
    background: #ffffff;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    --base-margin: 2.5mm;
    --block-width: 4.5mm;
}

/* ========== 定位块 ========== */
.corner-mark {
    position: absolute;
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 4);
    background: #000;
}
.tl { top: var(--base-margin); left: var(--base-margin); }
.tr { top: var(--base-margin); right: var(--base-margin); }
.bl { bottom: var(--base-margin); left: var(--base-margin); }
.br { bottom: var(--base-margin); right: var(--base-margin); }

.top-mark-container {
    position: absolute;
    top: var(--base-margin);
    left: calc(var(--base-margin) + var(--block-width) + 1mm);
    right: calc(var(--base-margin) + var(--block-width) + 1mm);
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: calc(var(--block-width) * 3 / 4);
}
.top-mark {
    width: var(--block-width);
    height: calc(var(--block-width) * 2 / 4);
    background: #000;
}

/* ========== 标题区 ========== */
.main-title {
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 18pt;
    color: #d93025;
    text-align: center;
    margin: 6mm 0 3mm;
    font-weight: normal;
}
.sub-title {
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 18pt;
    color: #000000;
    text-align: center;
    margin-bottom: 10mm;
    font-weight: normal;
}

/* ========== 姓名+准考证（表格已变大） ========== */
.info-line {
    display: flex;
    align-items: center;
    margin: 0 10mm 10mm;
    font-family: "SimSun", "宋体", serif;
    font-size: 12pt;
}
.name-text {
    margin-right: 4mm;
}
.name-line {
    width: 45mm;
    height: 1px;
    background: #d93025;
    margin-right: 12mm;
}
.zk-text {
    margin-right: 4mm;
}
.zk-table {
    border-collapse: collapse;
}
.zk-table td {
    width: 7mm;
    height: 8mm;
    border: 1px solid #d93025;
}

/* ========== 注意事项+条形码 ========== */
.note-barcode-wrap {
    display: flex;
    justify-content: space-between;
    margin: 0 10mm 12mm;
    align-items: center;
    gap: 5mm;
}
.note-table {
    border-collapse: collapse;
    border: 1px solid #d93025;
    width: 140mm;
}
.note-table td {
    border: 1px solid #d93025;
    vertical-align: top;
}
.note-left-cell {
    writing-mode: vertical-rl;
    color: #d93025;
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 12pt;
    padding: 4mm 2mm;
    letter-spacing: 2mm;
    width: 8mm;
}
.note-content-cell {
    padding: 3mm;
    font-family: "SimSun", "宋体", serif;
    font-size: 10pt;
    line-height: 1.5;
    color: #d93025;
}
.note-check-cell {
    padding: 2mm 3mm;
    font-family: "SimSun", "宋体", serif;
    font-size: 10pt;
    color: #d93025;
}
.note-check-box {
    display: inline-block;
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 5);
    border: 1px solid #d93025;
    margin-right: 2mm;
    vertical-align: middle;
}
.barcode-box {
    width: 50mm;
    height: 25mm;
    border: 1px dashed #d93025;
    border-radius: 3mm;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 3mm;
}
.barcode-title {
    font-family: "SimSun", "宋体", serif;
    font-size: 16pt;
    color: #d93025;
    margin-bottom: 2mm;
}
.barcode-tip {
    font-family: "SimSun", "宋体", serif;
    font-size: 9pt;
    color: #d93025;
    white-space: nowrap;
}

/* ========== 选择题区域 ========== */
.choice-wrap {
    position: relative;
    margin: 0 10mm;
}
.left-mark-outer {
    position: absolute;
    left: -6mm;
    top: 5.5mm;
}
.left-mark {
    width: var(--block-width);
    height: calc(var(--block-width) * 2 / 4);
    background: #000;
    margin-bottom: 1.5mm;
}
.choice-outer {
    border: 1px solid #d93025;
    border-radius: 4mm;
    padding: 3mm;
}
.choice-header {
    display: flex;
    align-items: center;
    margin-bottom: 2.5mm;
}
.choice-title {
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 14pt;
    color: #d93025;
    margin-right: 3mm;
}
.choice-tip {
    font-family: "SimSun", "宋体", serif;
    font-size: 10pt;
    flex: 1;
    color: #d93025;
}
.choice-example-block {
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 5);
    background: #000000;
    display: inline-block;
    vertical-align: middle;
}
.choice-inner {
    border: 1px solid #000000;
    padding: 2.5mm;
}
.choice-content-wrap {
    display: flex;
    align-items: flex-start;
    gap: 0;
    flex-wrap: wrap;
}
/* 关键修复：每一列必须有明确的宽度，不被压缩 */
.choice-col {
    display: flex;
    flex-direction: column;
    gap: 2.2mm;
    flex-shrink: 0;  /* 防止被压缩 */
}
.num-row {
    display: flex;
    gap: 1.2mm;
    justify-content: center;
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 10pt;
    color: #000000;
}
.num-item {
    width: var(--block-width);
    text-align: center;
}
.opt-row {
    display: flex;
    gap: 1.2mm;
}
.opt-box {
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 5);
    border: 1px solid #d93025;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 7.5pt;
    color: #d93025;
    background: #ffffff;
    flex-shrink: 0;
}
/* 隐形占位列：方框完整存在，只是所有颜色为白色 */
.opt-box-invisible {
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 5);
    border: 1px solid #ffffff;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "SimHei", "黑体", sans-serif;
    font-size: 7.5pt;
    color: #ffffff;
    flex-shrink: 0;
}
.invisible-num-cell {
    width: var(--block-width);
    text-align: center;
    color: #ffffff;
    background: #ffffff;
    font-size: 10pt;
}
/* 确保整个隐形列完全透明但结构完整 */
.invisible-col .num-row .num-item {
    border: none;
    background: #ffffff;
    color: #ffffff;
}
.right-example-group {
    display: flex;
    flex-direction: column;
    gap: 3mm;
    margin-left: 8mm;
}
.example-item {
    width: var(--block-width);
    height: calc(var(--block-width) * 3 / 5);
}
.ex-correct { background: #d93025; }
.ex-half { background: #cccccc; }
.ex-wrong { background: #333333; }

/* 调试用：临时显示占位框为红色（取消注释即可看到方框位置） */
/* .opt-box-invisible { border: 1px solid #ff0000 !important; background: #ffcccc !important; color: #ff0000 !important; } */
/* .invisible-num-cell { color: #ff0000 !important; background: #ffcccc !important; } */
</style>
</head>
<body>

<div class="input-panel">
    <h2 class="text-xl font-bold mb-5 text-center">答题卡生成器（精准复刻版）</h2>
    <div class="input-item">
        <label>答题卡标题</label>
        <input type="text" id="cardTitle" value="2026年普通高等学校招生全国统一考试模拟试卷">
    </div>
    <div class="input-item">
        <label>考试学科</label>
        <input type="text" id="cardSubject" value="数学">
    </div>
    <div class="input-item">
        <label>准考证号位数</label>
        <input type="number" id="zkLength" value="8" min="4" max="12">
    </div>
    <div class="input-item">
        <label>选择题数量</label>
        <input type="number" id="choiceTotal" value="27" min="1" max="50">
    </div>
    <button class="btn-generate" id="genBtn">生成答题卡</button>
    <button class="btn-pdf" id="pdfBtn">导出PDF</button>
</div>

<div id="cardContainer"></div>

<script>
const genBtn = document.getElementById('genBtn');
const pdfBtn = document.getElementById('pdfBtn');
const cardContainer = document.getElementById('cardContainer');

// 生成正常的一列（一组连续题目）
function generateNormalColumn(startNum, endNum) {
    let numHtml = '';
    for(let i = startNum; i <= endNum; i++) {
        numHtml += `<div class="num-item">${i}</div>`;
    }
    const numRowHtml = `<div class="num-row">${numHtml}</div>`;
    
    const itemCount = endNum - startNum + 1;
    const generateOptRow = (letter) => {
        let boxes = '';
        for(let i = 0; i < itemCount; i++) {
            boxes += `<div class="opt-box">${letter}</div>`;
        }
        return `<div class="opt-row">${boxes}</div>`;
    };
    
    return `<div class="choice-col">
        ${numRowHtml}
        ${generateOptRow('A')}
        ${generateOptRow('B')}
        ${generateOptRow('C')}
        ${generateOptRow('D')}
    </div>`;
}

// 生成隐形占位列：只占1道题目的宽度（1个空白题号 + 1组A/B/C/D白框）
// 方框完整存在，只是颜色为白色
function generateInvisibleColumn() {
    return `<div class="choice-col invisible-col">
        <div class="num-row">
            <div class="num-item invisible-num-cell"></div>
        </div>
        <div class="opt-row"><div class="opt-box-invisible">A</div></div>
        <div class="opt-row"><div class="opt-box-invisible">B</div></div>
        <div class="opt-row"><div class="opt-box-invisible">C</div></div>
        <div class="opt-row"><div class="opt-box-invisible">D</div></div>
    </div>`;
}

// 生成选择题HTML
function buildChoiceHtml(choiceTotal) {
    const GROUP_SIZE = 5;
    const MAX_GROUP_PER_LINE = 4;
    
    // 分组
    let groups = [];
    for(let start = 1; start <= choiceTotal; start += GROUP_SIZE) {
        let end = Math.min(start + GROUP_SIZE - 1, choiceTotal);
        groups.push({ start, end });
    }
    
    // 分行
    const lineGroups = [];
    let tempLine = [];
    groups.forEach(g => {
        if(tempLine.length >= MAX_GROUP_PER_LINE) {
            lineGroups.push(tempLine);
            tempLine = [g];
        } else {
            tempLine.push(g);
        }
    });
    if(tempLine.length) lineGroups.push(tempLine);
    
    let finalHtml = '';
    
    for(let lineIdx = 0; lineIdx < lineGroups.length; lineIdx++) {
        const currentLine = lineGroups[lineIdx];
        
        for(let groupIdx = 0; groupIdx < currentLine.length; groupIdx++) {
            const group = currentLine[groupIdx];
            // 添加正常列（一组题目）
            finalHtml += generateNormalColumn(group.start, group.end);
            
            // 在组与组之间插入【1道题宽度】的隐形占位列
            const isLastGroupInLine = (groupIdx === currentLine.length - 1);
            if (!isLastGroupInLine) {
                finalHtml += generateInvisibleColumn();
            }
        }
        
        // 行间距
        if(lineIdx < lineGroups.length - 1) {
            finalHtml += `<div style="width:100%;height:3mm;"></div>`;
        }
    }
    
    return finalHtml;
}

function buildZkTableHtml(zkLen) {
    let zkHtml = '';
    for(let i = 0; i < zkLen; i++) {
        zkHtml += '<td><td>';
    }
    return zkHtml;
}

function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    });
}

function renderAnswerCard(title, subject, zkLen, choiceTotal) {
    const zkTableHtml = buildZkTableHtml(zkLen);
    const choiceHtml = buildChoiceHtml(choiceTotal);
    
    return `
    <div class="answer-card" id="pdfTarget">
        <div class="corner-mark tl"></div>
        <div class="corner-mark tr"></div>
        <div class="corner-mark bl"></div>
        <div class="corner-mark br"></div>

        <div class="top-mark-container">
            ${Array(31).fill('<div class="top-mark"></div>').join('')}
        </div>

        <div class="main-title">${escapeHtml(title)}</div>
        <div class="sub-title">${escapeHtml(subject)}答题卡</div>

        <div class="info-line">
            <span class="name-text">姓名：</span>
            <div class="name-line"></div>
            <span class="zk-text">准考证号</span>
            <table class="zk-table">
                <tr>${zkTableHtml}</tr>
            </table>
        </div>

        <div class="note-barcode-wrap">
            <table class="note-table">
                <tr>
                    <td rowspan="2" class="note-left-cell">注意事项</td>
                    <td class="note-content-cell">
                        1.答题前，考生先填写好自己的姓名、准考证号，并认真核对条形码上的姓名、准考证号、考室和座位号；<br>
                        2.在草稿纸、试题卷上答题无效；<br>
                        3.答题时，请考生注意各题号后面的答题提示；<br>
                        4.请勿折叠答题卡，保持字体工整、笔迹清晰、卡面清洁。
                    </td>
                </tr>
                <tr>
                    <td class="note-check-cell">
                        <span class="note-check-box"></span>← 此方框为缺考考生标记，由监考员用2B铅笔填涂
                    </td>
                </tr>
            </table>
            <div class="barcode-box">
                <div class="barcode-title">贴条形码区</div>
                <div class="barcode-tip">(正面朝上，切勿贴出虚线方框)</div>
            </div>
        </div>

        <div class="choice-wrap">
            <div class="left-mark-outer">
                <div class="left-mark"></div>
                <div class="left-mark"></div>
                <div class="left-mark"></div>
                <div class="left-mark"></div>
            </div>
            <div class="choice-outer">
                <div class="choice-header">
                    <span class="choice-title">选择题</span>
                    <span class="choice-tip">(提示:请用2B铅笔在正确答案上填涂，修改时只能用橡皮擦干净，不留痕迹。正确填涂示例：<span class="choice-example-block"></span>)</span>
                </div>
                <div class="choice-inner">
                    <div class="choice-content-wrap">
                        ${choiceHtml}
                        <div class="right-example-group">
                            <div class="example-item ex-correct"></div>
                            <div class="example-item ex-half"></div>
                            <div class="example-item ex-wrong"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    `;
}

genBtn.addEventListener('click', () => {
    const title = document.getElementById('cardTitle').value;
    const subject = document.getElementById('cardSubject').value;
    const zkLen = Number(document.getElementById('zkLength').value);
    let choiceTotal = Number(document.getElementById('choiceTotal').value);
    if(isNaN(choiceTotal) || choiceTotal < 1) choiceTotal = 1;
    if(choiceTotal > 50) choiceTotal = 50;
    
    cardContainer.innerHTML = renderAnswerCard(title, subject, zkLen, choiceTotal);
    pdfBtn.style.display = 'block';
});

pdfBtn.addEventListener('click', () => {
    const target = document.getElementById('pdfTarget');
    if(!target) return;
    html2pdf().set({
        margin: 0,
        filename: '答题卡.pdf',
        image: { type: 'image/png', quality: 1 },
        html2canvas: { scale: 3 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(target).save();
});

// 初始加载
window.addEventListener('DOMContentLoaded', () => {
    const title = document.getElementById('cardTitle').value;
    const subject = document.getElementById('cardSubject').value;
    const zkLen = Number(document.getElementById('zkLength').value);
    const choiceTotal = Number(document.getElementById('choiceTotal').value);
    cardContainer.innerHTML = renderAnswerCard(title, subject, zkLen, choiceTotal);
    pdfBtn.style.display = 'block';
});
</script>
</body>
</html>
