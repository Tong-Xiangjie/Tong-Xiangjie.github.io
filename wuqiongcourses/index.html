<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无穹书院培养方案完成情况</title>
  <link rel="stylesheet" href="style.css">
  <script src="data.js"></script>
</head>
<body>

<div class="header">
  <h1 id="pageTitle"></h1>
  <div class="subtitle">课程完成情况一览</div>
  <div class="version" id="headerVersion"></div>
</div>

<div class="container" style="max-width:1200px;margin:0 auto;padding-bottom:20px;">

  <div class="student-info" id="studentInfo"></div>

  <div class="nav-bar" id="navBar"></div>

  <!-- 学分概览 -->
  <div class="section-card" id="summarySection">
    <div class="section-title">学分要求概览</div>
    <table class="summary-table" id="summaryTable">
      <thead>
        <tr>
          <th>类别</th>
          <th>要求学分</th>
          <th>已修学分</th>
          <th>完成情况</th>
        </tr>
      </thead>
      <tbody id="summaryBody"></tbody>
    </table>
  </div>

  <!-- 通识选修课（四个课组） -->
  <div class="gedu-section" id="geduSection">
    <div class="section-title">通识选修课（四个课组）</div>
    <div class="section-note" id="geduNote"></div>
    <div class="gedu-groups" id="geduGroups"></div>
  </div>

  <!-- 学期课程 -->
  <div id="semesterContainer"></div>

  <!-- 专业选修课组 -->
  <div class="elective-section" id="electiveSection">
    <div class="section-title">专业选修课组详情</div>
    <div class="section-desc" id="electiveDesc"></div>
    <div id="electiveGroups"></div>
  </div>

  <div class="footer">
    <p>数据维护：修改 data.js 中的 score 字段（绩点数值 / "已选课" / "未修"）</p>
    <p>本网站为静态托管，所有数据均在本地管理</p>
  </div>
</div>

<script>
(function() {
  var data = curriculumData;

  // ====== 工具函数 ======
  function scoreDisplay(score) {
    if (score === "未修" || score === undefined || score === null || score === "") {
      return '<span class="score-none">未修</span>';
    }
    if (score === "已选课") {
      return '<span class="score-ongoing">已选课</span>';
    }
    var num = parseFloat(score);
    if (!isNaN(num)) {
      return '<span class="score-pass">' + num.toFixed(1) + '</span>';
    }
    return '<span class="score-pass">' + score + '</span>';
  }

  function isTaken(score) {
    if (score === "未修" || score === undefined || score === null || score === "") {
      return false;
    }
    return true;
  }

  function catToKey(cat) {
    var m = {
      "思想政治理论课": "ideology",
      "体育": "pe",
      "外语": "foreignLang",
      "写作与沟通": "writing",
      "通识选修课": "liberal",
      "军事课程": "military",
      "数学基础": "math",
      "科学基础": "science",
      "信息基础": "informatics",
      "专业核心课程": "core",
      "专业选修课程": "elective",
      "创新实践环节": "practice"
    };
    return m[cat] || "other";
  }

  function earnedByKey(key) {
    var t = 0;
    data.semesters.forEach(function(sem) {
      sem.courses.forEach(function(c) {
        if (catToKey(c.category) === key && isTaken(c.score)) {
          t += c.credits;
        }
      });
    });
    return t;
  }

  // ====== 渲染 ======

  // 1. 标题
  document.getElementById("pageTitle").innerHTML = data.meta.title;
  document.getElementById("headerVersion").textContent = "版本: " + (data.meta.version || "") + " | 更新: " + (data.meta.lastUpdated || "");

  // 2. 学生信息
  var si = document.getElementById("studentInfo");
  si.innerHTML =
    '<div class="info-item"><span class="label">姓名</span><span class="value">' + data.student.name + '</span></div>' +
    '<div class="info-item"><span class="label">学号</span><span class="value">' + data.student.studentId + '</span></div>' +
    '<div class="info-item"><span class="label">书院</span><span class="value">' + data.student.major + '</span></div>' +
    '<div class="info-item"><span class="label">方向</span><span class="value">' + data.student.direction + '</span></div>';

  // 3. 导航栏
  var nav = document.getElementById("navBar");
  var nhtml = '<a href="#summarySection">学分概览</a>';
  nhtml += '<span class="nav-sep">|</span><a href="#geduSection">通识选修课</a>';
  data.semesters.forEach(function(sem, idx) {
    nhtml += '<span class="nav-sep">|</span>';
    nhtml += '<a href="#sem' + idx + '">' + sem.year + ' ' + sem.season + '</a>';
  });
  nhtml += '<span class="nav-sep">|</span><a href="#electiveSection">选修课组</a>';
  nav.innerHTML = nhtml;

  // 4. 学分概览
  var sb = document.getElementById("summaryBody");
  var s = "";

  // 校级通识教育
  var genKeys = ["ideology","pe","foreignLang","writing","liberal","military"];
  var genEarned = 0;
  genKeys.forEach(function(k) { genEarned += earnedByKey(k); });
  s += '<tr><td><strong>校级通识教育</strong></td><td>47</td><td>' + genEarned.toFixed(1) + '</td><td class="' + (genEarned>=47?'status-done':'status-warn') + '">' + (genEarned>=47?'已完成':'未完成') + '</td></tr>';

  var subs = [
    {l:"思想政治理论课",k:"ideology",r:18},
    {l:"体育",k:"pe",r:4},
    {l:"外语",k:"foreignLang",r:8},
    {l:"写作与沟通",k:"writing",r:2},
    {l:"通识选修课",k:"liberal",r:11},
    {l:"军事课程",k:"military",r:4}
  ];
  subs.forEach(function(x) {
    var e = earnedByKey(x.k);
    s += '<tr class="sub-row"><td>' + x.l + '</td><td>' + x.r + '</td><td>' + e.toFixed(1) + '</td><td class="' + (e>=x.r?'status-done':(e>0?'status-warn':'status-neutral')) + '">' + (e>=x.r?'已完成':(e>0?'进行中':'未开始')) + '</td></tr>';
  });

  // 基础课程
  var fKeys = ["math","science","informatics"];
  var fEarned = 0;
  fKeys.forEach(function(k){fEarned+=earnedByKey(k);});
  s += '<tr><td><strong>基础课程</strong></td><td>44-49</td><td>' + fEarned.toFixed(1) + '</td><td class="status-neutral">' + (fEarned>=44?'满足最低要求':'进行中') + '</td></tr>';

  var fsubs = [
    {l:"数学基础",k:"math",r:25},
    {l:"科学基础",k:"science",rl:4,rh:9},
    {l:"信息基础",k:"informatics",r:15}
  ];
  fsubs.forEach(function(x) {
    var e = earnedByKey(x.k);
    var req = x.r ? x.r : (x.rl + "-" + x.rh);
    var ok = x.r ? (e>=x.r) : (e>=x.rl);
    s += '<tr class="sub-row"><td>' + x.l + '</td><td>' + req + '</td><td>' + e.toFixed(1) + '</td><td class="' + (ok?'status-done':(e>0?'status-warn':'status-neutral')) + '">' + (ok?'已完成':(e>0?'进行中':'未开始')) + '</td></tr>';
  });

  // 专业核心
  var coreE = earnedByKey("core");
  s += '<tr><td><strong>专业核心课程</strong></td><td>16</td><td>' + coreE.toFixed(1) + '</td><td class="' + (coreE>=16?'status-done':(coreE>0?'status-warn':'status-neutral')) + '">' + (coreE>=16?'已完成':(coreE>0?'进行中':'未开始')) + '</td></tr>';

  // 专业选修
  var elecE = earnedByKey("elective");
  s += '<tr><td><strong>专业选修课程</strong></td><td>20-26</td><td>' + elecE.toFixed(1) + '</td><td class="' + (elecE>=20?'status-done':(elecE>0?'status-warn':'status-neutral')) + '">' + (elecE>=20?'满足最低要求':(elecE>0?'进行中':'未开始')) + '</td></tr>';

  // 创新实践
  var pracE = earnedByKey("practice");
  s += '<tr><td><strong>创新实践环节</strong></td><td>18</td><td>' + pracE.toFixed(1) + '</td><td class="' + (pracE>=18?'status-done':(pracE>0?'status-warn':'status-neutral')) + '">' + (pracE>=18?'已完成':(pracE>0?'进行中':'未开始')) + '</td></tr>';

  // 总计
  var totalE = genEarned + fEarned + coreE + elecE + pracE;
  s += '<tr class="total-row"><td>总计</td><td>146-150</td><td>' + totalE.toFixed(1) + '</td><td class="' + (totalE>=146?'status-done':'status-warn') + '">' + (totalE>=146?'满足毕业要求':'未满足毕业要求') + '</td></tr>';
  sb.innerHTML = s;

  // 5. 通识选修课（四个课组）
  document.getElementById("geduNote").textContent = data.generalEducation.note || "";

  var gg = document.getElementById("geduGroups");
  var ghtml = "";
  data.generalEducation.groups.forEach(function(g) {
    ghtml += '<div class="gedu-group">';
    ghtml += '<div class="group-header">' + g.name + ' <span class="req">（至少' + g.required + '学分）</span></div>';
    g.courses.forEach(function(c) {
      ghtml += '<div class="gedu-course-row">';
      ghtml += '<span class="g-name">' + c.name + '</span>';
      if (c.credits > 0) {
        ghtml += '<span class="g-credit">' + c.credits + '学分</span>';
      } else {
        ghtml += '<span class="g-credit" style="color:#ccc;">-</span>';
      }
      ghtml += '<span class="g-score">' + scoreDisplay(c.score) + '</span>';
      if (c.remark) {
        ghtml += '<span style="font-size:11px;color:#999;">' + c.remark + '</span>';
      }
      ghtml += '</div>';
    });
    ghtml += '</div>';
  });
  gg.innerHTML = ghtml;

  // 6. 学期课程表
  var sc = document.getElementById("semesterContainer");
  data.semesters.forEach(function(sem, idx) {
    var card = document.createElement("div");
    card.className = "semester-card";
    card.id = "sem" + idx;

    var semE = 0;
    sem.courses.forEach(function(c){if(isTaken(c.score))semE+=c.credits;});

    card.innerHTML = '<div class="semester-header"><div class="semester-title">' + sem.year + ' - ' + sem.season + '</div><div class="semester-note">' + (sem.note||"") + ' | 已修: ' + semE.toFixed(1) + ' 学分</div></div>';

    var tbl = document.createElement("table");
    tbl.className = "course-table";
    tbl.innerHTML = '<thead><tr><th class="col-id">课程编号</th><th class="col-name">课程名称</th><th class="col-credit">学分</th><th class="col-category">类别</th><th class="col-score">成绩/绩点</th><th class="col-remark">备注</th></tr></thead>';

    var tbody = document.createElement("tbody");
    sem.courses.forEach(function(c) {
      var tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="col-id">' + (c.id||"") + '</td>' +
        '<td class="col-name">' + c.name + '</td>' +
        '<td class="col-credit">' + c.credits + '</td>' +
        '<td class="col-category">' + (c.category||"") + '</td>' +
        '<td class="col-score">' + scoreDisplay(c.score) + '</td>' +
        '<td class="col-remark">' + (c.remark||"") + '</td>';
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    card.appendChild(tbl);
    sc.appendChild(card);
  });

  // 7. 专业选修课组
  if (data.electiveGroups) {
    document.getElementById("electiveDesc").textContent = data.electiveGroups.title || "";
    var egc = document.getElementById("electiveGroups");
    var egh = "";
    data.electiveGroups.groups.forEach(function(g) {
      egh += '<div class="elective-group"><div class="group-name">' + g.name + '</div>';
      if (g.required && g.required.length) {
        egh += '<div class="group-courses"><strong>A类必修：</strong>';
        g.required.forEach(function(c) {
          egh += '<span class="course-tag">' + c.name + ' (' + c.credits + '学分)' + (c.remark?' - ' + c.remark:'') + '</span>';
        });
        egh += '</div>';
      }
      if (g.optional && g.optional.length) {
        egh += '<div class="group-courses" style="margin-top:4px;"><strong>B类选修：</strong>';
        g.optional.forEach(function(c) {
          egh += '<span class="course-tag">' + c.name + ' (' + c.credits + '学分)' + (c.remark?' - ' + c.remark:'') + '</span>';
        });
        egh += '</div>';
      }
      egh += '</div>';
    });
    egc.innerHTML = egh;
  }
})();
</script>

</body>
</html>
