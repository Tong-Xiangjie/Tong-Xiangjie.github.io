<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>铜の币纪 | 趣味收藏 | 年份图鉴</title>
    <link rel="stylesheet" href="../css/common.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        /* ========== 强制思源黑体（年份花体除外） ========== */
        body, .container, .breadcrumb, .section-title, .section-sub,
        .year-count, .year-preview-more, .modal-header, .modal-body,
        .year-note-name, .year-note-krause, .scroll-header, .mini-card,
        .stat-card, .collapsible-header, .collapsible-content,
        .all-notes-table, .all-notes-table th, .all-notes-table td,
        .footer, .sub, h1, .modal-close, .scroll-hint, .stat-title, .stat-desc, .label, .sub-value,
        .year-card, .year-number, .back-link, .switch-btn {
            font-family: 'Noto Sans CJK SC', 'Source Han Sans SC', 'Noto Sans', sans-serif;
        }

        /* 年份数字专用花体字（覆盖上面的强制） */
        .year-number {
            font-family: 'Segoe UI', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif !important;
        }

        /* ========== 年份图鉴专属样式 ========== */
        .section-title {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 2rem 0 0.5rem 0;
            color: #3a2a1c;
            border-left: 4px solid #daa520;
            padding-left: 1rem;
        }

        .year-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0 2rem 0;
        }

        .year-card {
            background: white;
            border-radius: 0.75rem;
            padding: 1rem 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e2d5c8;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        }
        .year-card:hover {
            transform: translateY(-4px);
            border-color: #c9aa7b;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
        }

        .year-number {
            font-size: 1.8rem;
            font-weight: 500;
            color: #b8860b;
            line-height: 1.3;
            letter-spacing: 2px;
        }

        .year-count {
            font-size: 0.7rem;
            color: #8b6b4f;
            margin-top: 0.5rem;
            background: #f0ebe3;
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
        }

        .year-preview {
            margin-top: 0.75rem;
            display: flex;
            justify-content: center;
            gap: 0.3rem;
            flex-wrap: wrap;
        }
        /* 预览小图 4:3 比例 */
        .year-preview-img {
            width: 48px;
            height: 36px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #e2d5c8;
            background: #faf5ef;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .year-preview-img:hover {
            opacity: 0.8;
        }
        .year-preview-more {
            font-size: 0.6rem;
            color: #b1967c;
            background: #f0ebe3;
            padding: 0 0.4rem;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
        }

        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.show {
            opacity: 1;
        }
        .modal-container {
            background: #f0ebe3;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            border-radius: 1rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }
        .modal-overlay.show .modal-container {
            transform: scale(1);
        }
        .modal-header {
            padding: 1rem 1.2rem;
            background: white;
            border-bottom: 1px solid #e2d5c8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            font-size: 1.3rem;
            color: #b8860b;
            font-weight: 500;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #8b6b4f;
            padding: 0 0.5rem;
            transition: color 0.2s ease;
        }
        .modal-close:hover {
            color: #b8860b;
        }
        .modal-body {
            padding: 1.2rem;
            overflow-y: auto;
        }
        .year-note-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .year-note-item {
            display: flex;
            gap: 1rem;
            padding: 0.8rem;
            background: white;
            border-radius: 0.6rem;
            border: 1px solid #e2d5c8;
            transition: all 0.2s ease;
        }
        .year-note-item:hover {
            border-color: #daa520;
            transform: translateX(2px);
        }
        /* 弹窗内大图 4:3 比例 */
        .year-note-img {
            width: 120px;
            height: 90px;
            object-fit: cover;
            border-radius: 0.4rem;
            background: #faf5ef;
            flex-shrink: 0;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .year-note-img:hover {
            opacity: 0.8;
        }
        .year-note-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .year-note-name {
            font-weight: 500;
            color: #4a3522;
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }
        .year-note-krause {
            font-size: 0.7rem;
            color: #b8860b;
        }

        /* 横向滚动区 */
        .scroll-section {
            margin: 2rem 0;
        }
        .scroll-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .scroll-header h3 {
            font-size: 1.2rem;
            font-weight: 500;
            color: #4a3522;
        }
        .scroll-hint {
            font-size: 0.65rem;
            color: #b8860b;
        }
        .horizontal-scroll {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
        }
        .horizontal-scroll::-webkit-scrollbar {
            height: 5px;
        }
        .horizontal-scroll::-webkit-scrollbar-track {
            background: #e2d5c8;
            border-radius: 10px;
        }
        .horizontal-scroll::-webkit-scrollbar-thumb {
            background: #daa520;
            border-radius: 10px;
        }
        .mini-card {
            flex: 0 0 160px;
            background: white;
            border-radius: 0.6rem;
            padding: 1rem;
            border: 1px solid #e2d5c8;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .mini-card:hover {
            background: #fef9f0;
            border-color: #daa520;
            transform: translateY(-2px);
        }
        .mini-card .label {
            font-size: 0.65rem;
            color: #b8860b;
            font-weight: 500;
        }
        .mini-card .value {
            font-size: 1.2rem;
            font-weight: 500;
            margin-top: 0.3rem;
            color: #2c2418;
        }
        .mini-card .sub-value {
            font-size: 0.65rem;
            color: #8b6b4f;
            margin-top: 0.3rem;
        }

        /* 统计卡片 */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .stat-card {
            background: white;
            border-radius: 0.6rem;
            padding: 1rem;
            border: 1px solid #e7ddd0;
            transition: all 0.2s ease;
        }
        .stat-card:hover {
            border-color: #daa520;
            transform: translateY(-2px);
        }
        .stat-title {
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            color: #b1967c;
            margin-bottom: 0.5rem;
        }
        .stat-number {
            font-size: 1.6rem;
            font-weight: 500;
            color: #b8860b;
            line-height: 1.2;
        }
        .stat-desc {
            font-size: 0.7rem;
            color: #6b5a48;
            margin-top: 0.4rem;
        }

        /* 大图弹窗 - 保持原主站逻辑 */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }
        .image-modal-content {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
        }
        .modal-img {
            display: block;
            max-width: 90vw;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1101;
            transition: background 0.2s ease;
        }
        .image-modal-close:hover {
            background: rgba(0, 0, 0, 0.8);
        }
        .image-modal-tip {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            pointer-events: none;
        }

        /* ========== 可折叠全部列表样式 ========== */
        .collapsible-section {
            margin: 2rem 0;
            border-top: 1px solid #e2d5c8;
            padding-top: 1.5rem;
        }
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 0.8rem 0;
            font-size: 1.2rem;
            font-weight: 500;
            color: #4a3522;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            transition: color 0.2s ease;
        }
        .collapsible-header:hover {
            color: #b8860b;
        }
        .collapse-icon {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }
        .collapse-icon.open {
            transform: rotate(90deg);
        }
        
        /* 折叠内容区域 - 支持高度过渡动画 */
        .collapsible-content {
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
        }
        .collapsible-content.open {
            max-height: 2000px;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 全部纸币表格样式 - 年份列增宽两个字符 */
        .all-notes-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            table-layout: auto;
        }
        .all-notes-table th,
        .all-notes-table td {
            padding: 0.8rem 0.5rem;
            text-align: left;
            border-bottom: 1px solid #e2d5c8;
            vertical-align: middle;
            word-break: break-word;
        }
        /* 年份列增宽两个字符（约 2em） */
        .all-notes-table th:nth-child(2),
        .all-notes-table td:nth-child(2) {
            min-width: 5em;
            padding-right: 1rem;
        }
        .all-notes-table th {
            background: #f0ebe3;
            color: #b8860b;
            font-weight: 500;
        }
        .all-notes-table tr {
            transition: background 0.2s ease;
        }
        .all-notes-table tr:hover {
            background: #faf5ef;
        }
        .table-img {
            width: 60px;
            height: 45px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #e2d5c8;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .table-img:hover {
            opacity: 0.8;
        }
        .table-year {
            font-weight: 500;
            color: #b8860b;
        }
        .table-krause {
            font-size: 0.7rem;
            color: #8b6b4f;
        }

        @media (max-width: 650px) {
            .year-grid {
                gap: 0.8rem;
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
            .year-number {
                font-size: 1.4rem;
                letter-spacing: 1px;
            }
            .year-preview-img {
                width: 40px;
                height: 30px;
            }
            .year-note-img {
                width: 100px;
                height: 75px;
            }
            .year-note-item {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .table-img {
                width: 48px;
                height: 36px;
            }
            .all-notes-table th,
            .all-notes-table td {
                padding: 0.5rem 0.3rem;
                font-size: 0.75rem;
            }
            .all-notes-table {
                font-size: 0.7rem;
            }
            .all-notes-table td:first-child {
                width: 55px;
            }
            /* 移动端年份列仍保持增宽 */
            .all-notes-table th:nth-child(2),
            .all-notes-table td:nth-child(2) {
                min-width: 4.5em;
                padding-right: 0.6rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="hero-image">
            <img src="../../coincollection/image/decoration/headphoto.png" alt="铜の币纪" onerror="this.style.display='none'">
        </div>
        <h1>纸币 | 年份图鉴</h1>
        <div class="sub">每一枚年份数字，都是纸币的独特笔迹</div>
    </div>

    <div class="breadcrumb">
        <a href="../">趣味收藏</a> / 年份图鉴
        <span style="float: right;">点击年份卡片，查看该年份所有纸币</span>
    </div>

    <div class="section-title">年份分布</div>

    <div class="year-grid" id="yearGrid"></div>

    <div class="scroll-section">
        <div class="scroll-header">
            <h3>年代时间轴</h3>
            <div class="scroll-hint">横向滚动 · 查看各年代藏品数量</div>
        </div>
        <div class="horizontal-scroll" id="decadeScroll"></div>
    </div>

    <div class="section-title">统计数据</div>
    <div class="feature-grid" id="statsGrid"></div>

    <!-- 可折叠的全部纸币列表 -->
    <div class="collapsible-section">
        <button class="collapsible-header" id="collapseBtn">
            <span id="collapseTitle">全部纸币清单</span>
            <span class="collapse-icon" id="collapseIcon">›</span>
        </button>
        <div class="collapsible-content" id="collapsibleContent">
            <div id="allNotesTableContainer"></div>
        </div>
    </div>

    <div class="footer">
        网页建立时间：2026年5月2日<br>© 2026 铜の币纪 版权所有
    </div>
</div>

<!-- 年份详情弹窗 -->
<div id="yearModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalYearTitle">---- 年</h3>
            <button class="modal-close" onclick="closeYearModal()">×</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<!-- 大图弹窗 -->
<div id="imageModal" class="image-modal">
    <div class="image-modal-close" onclick="closeImageModal()">✕</div>
    <div class="image-modal-content">
        <div class="image-container" id="imageContainer">
            <img id="modalImg" class="modal-img" src="" alt="年份实拍图">
        </div>
    </div>
    <div class="image-modal-tip">双指缩放 | 拖动查看 | 点击背景关闭</div>
</div>

<script src="data.js"></script>
<script>
    // ========== 页面加载后回到顶部 ==========
    window.addEventListener('load', function() {
        window.scrollTo(0, 0);
    });

    // ========== 数字转双圈字符 ==========
    function toCircledNumber(num) {
        const numStr = num.toString();
        const circledDigits = {
            '0': '𝟘', '1': '𝟙', '2': '𝟚', '3': '𝟛', '4': '𝟜',
            '5': '𝟝', '6': '𝟞', '7': '𝟟', '8': '𝟠', '9': '𝟡'
        };
        return numStr.split('').map(d => circledDigits[d] || d).join('');
    }

    // ========== 大图弹窗逻辑（保持主站原逻辑） ==========
    let hammerManager = null;
    let currentScale = 1, currentX = 0, currentY = 0;

    function initPinchZoom() {
        if (typeof Hammer === 'undefined') return;
        const container = document.getElementById('imageContainer');
        if (!container) return;
        if (hammerManager) hammerManager.destroy();
        hammerManager = new Hammer.Manager(container);
        const pinch = new Hammer.Pinch();
        const pan = new Hammer.Pan();
        hammerManager.add([pinch, pan]);
        let lastScale = 1, lastX = 0, lastY = 0;
        function resetTransform() {
            currentScale = 1; currentX = 0; currentY = 0;
            container.style.transform = `translate3d(0px, 0px, 0px) scale3d(1, 1, 1)`;
        }
        function clampTransform() {
            const img = document.getElementById('modalImg');
            if (!img) return;
            const containerRect = container.parentElement.getBoundingClientRect();
            const imgRect = img.getBoundingClientRect();
            let maxX = 0, maxY = 0;
            if (imgRect.width > containerRect.width) maxX = (imgRect.width - containerRect.width) / 2;
            if (imgRect.height > containerRect.height) maxY = (imgRect.height - containerRect.height) / 2;
            currentX = Math.min(maxX, Math.max(-maxX, currentX));
            currentY = Math.min(maxY, Math.max(-maxY, currentY));
            container.style.transform = `translate3d(${currentX}px, ${currentY}px, 0px) scale3d(${currentScale}, ${currentScale}, 1)`;
        }
        hammerManager.on('pinchstart', e => { lastScale = currentScale; e.preventDefault(); });
        hammerManager.on('pinchmove', e => {
            let newScale = lastScale * e.scale;
            newScale = Math.min(4, Math.max(1, newScale));
            currentScale = newScale;
            container.style.transform = `translate3d(${currentX}px, ${currentY}px, 0px) scale3d(${currentScale}, ${currentScale}, 1)`;
            e.preventDefault();
        });
        hammerManager.on('pinchend', e => { clampTransform(); e.preventDefault(); });
        hammerManager.on('panstart', e => { lastX = currentX; lastY = currentY; });
        hammerManager.on('panmove', e => {
            if (currentScale > 1) {
                currentX = lastX + e.deltaX;
                currentY = lastY + e.deltaY;
                container.style.transform = `translate3d(${currentX}px, ${currentY}px, 0px) scale3d(${currentScale}, ${currentScale}, 1)`;
            }
            e.preventDefault();
        });
        hammerManager.on('panend', e => { clampTransform(); });
        container.addEventListener('dblclick', e => { resetTransform(); e.preventDefault(); });
        resetTransform();
    }

    function openImageModal(imgSrc) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        modalImg.src = imgSrc;
        modal.style.display = 'flex';
        const container = document.getElementById('imageContainer');
        if (container) {
            container.style.transform = `translate3d(0px, 0px, 0px) scale3d(1, 1, 1)`;
            currentScale = 1; currentX = 0; currentY = 0;
        }
        const scrollY = window.scrollY;
        document.body.classList.add('modal-open');
        document.body.style.top = `-${scrollY}px`;
        modalImg.onload = () => initPinchZoom();
        if (modalImg.complete) initPinchZoom();
    }

    function closeImageModal() {
        const modal = document.getElementById('imageModal');
        modal.style.display = 'none';
        const scrollY = parseInt(document.body.style.top || '0') * -1;
        document.body.classList.remove('modal-open');
        document.body.style.top = '';
        if (scrollY) window.scrollTo(0, scrollY);
        if (hammerManager) { hammerManager.destroy(); hammerManager = null; }
    }

    document.getElementById('imageModal')?.addEventListener('click', function(e) {
        if (e.target === this || e.target.classList.contains('image-modal-content')) closeImageModal();
    });

    // ========== 年份图鉴逻辑 ==========
    const yearMap = new Map();
    for (let note of banknoteYears) {
        if (!yearMap.has(note.year)) yearMap.set(note.year, []);
        yearMap.get(note.year).push(note);
    }
    const sortedYears = Array.from(yearMap.keys()).sort((a,b) => a-b);

    function renderYearCards() {
        const grid = document.getElementById('yearGrid');
        grid.innerHTML = '';
        for (let year of sortedYears) {
            const notes = yearMap.get(year);
            const count = notes.length;
            const previewImgs = notes.slice(0, 3).map(n => n.yearImg);
            const hasMore = count > 3;
            const card = document.createElement('div');
            card.className = 'year-card';
            card.onclick = (e) => {
                if (e.target.classList.contains('year-preview-img')) return;
                openYearModal(year, notes);
            };
            let previewHtml = '';
            if (previewImgs.length) {
                previewHtml = '<div class="year-preview">';
                for (let imgUrl of previewImgs) {
                    previewHtml += `<img src="${imgUrl}" class="year-preview-img" onclick="event.stopPropagation(); openImageModal('${imgUrl}')">`;
                }
                if (hasMore) previewHtml += `<span class="year-preview-more">+${count - 3}</span>`;
                previewHtml += '</div>';
            }
            card.innerHTML = `
                <div class="year-number">${toCircledNumber(year)}</div>
                <div class="year-count">${count} 张藏品</div>
                ${previewHtml}
            `;
            grid.appendChild(card);
        }
    }

    function openYearModal(year, notes) {
        const modal = document.getElementById('yearModal');
        const titleText = typeof year === 'string' ? `${year} · 共 ${notes.length} 张` : `${year} 年 · 共 ${notes.length} 张`;
        document.getElementById('modalYearTitle').innerText = titleText;
        let listHtml = '<div class="year-note-list">';
        for (let note of notes) {
            listHtml += `
                <div class="year-note-item">
                    <img src="${note.yearImg}" class="year-note-img" onclick="openImageModal('${note.yearImg}')">
                    <div class="year-note-info">
                        <div class="year-note-name">${note.name}</div>
                        <div class="year-note-krause">${note.krause}</div>
                    </div>
                </div>
            `;
        }
        listHtml += '</div>';
        document.getElementById('modalBody').innerHTML = listHtml;
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('show'), 10);
        document.body.style.overflow = 'hidden';
    }

    function closeYearModal() {
        const modal = document.getElementById('yearModal');
        modal.classList.remove('show');
        setTimeout(() => {
            modal.style.display = 'none';
        }, 200);
        document.body.style.overflow = '';
    }
    document.getElementById('yearModal')?.addEventListener('click', e => { if (e.target === e.currentTarget) closeYearModal(); });

    function renderDecadeScroll() {
        const decadeMap = new Map();
        for (let [year, notes] of yearMap.entries()) {
            const decade = Math.floor(year / 10) * 10;
            decadeMap.set(`${decade}s`, (decadeMap.get(`${decade}s`) || 0) + notes.length);
        }
        const container = document.getElementById('decadeScroll');
        container.innerHTML = '';
        for (let [dec, count] of [...decadeMap.entries()].sort()) {
            const card = document.createElement('div');
            card.className = 'mini-card';
            const decadeStart = parseInt(dec);
            card.onclick = () => {
                const filteredYears = sortedYears.filter(y => y >= decadeStart && y <= decadeStart + 9);
                if (filteredYears.length) {
                    const decadeNotes = filteredYears.flatMap(y => yearMap.get(y));
                    openYearModal(dec, decadeNotes);
                }
            };
            card.innerHTML = `<div class="label">年代</div><div class="value">${dec}</div><div class="sub-value">${count} 张</div>`;
            container.appendChild(card);
        }
    }

    function renderStats() {
        const totalNotes = banknoteYears.length;
        const totalYears = yearMap.size;
        const minYear = sortedYears[0], maxYear = sortedYears[sortedYears.length - 1];
        let maxCountYear = null, maxCount = 0;
        for (let [year, notes] of yearMap) if (notes.length > maxCount) { maxCount = notes.length; maxCountYear = year; }
        const stats = [
            { title: "藏品总数", number: totalNotes, desc: "已收录纸币" },
            { title: "不同年份", number: totalYears, desc: "跨越的年份刻度" },
            { title: "时间跨度", number: `${minYear} — ${maxYear}`, desc: "年份区间" },
            { title: "最密年份", number: `${maxCountYear}年`, desc: `${maxCount} 张藏品` }
        ];
        const container = document.getElementById('statsGrid');
        container.innerHTML = '';
        for (let s of stats) {
            const card = document.createElement('div');
            card.className = 'stat-card';
            card.innerHTML = `<div class="stat-title">${s.title}</div><div class="stat-number">${s.number}</div><div class="stat-desc">${s.desc}</div>`;
            container.appendChild(card);
        }
    }

    // ========== 全部纸币清单（按年份排序） ==========
    function renderAllNotesTable() {
        const allNotes = [...banknoteYears].sort((a, b) => {
            if (a.year !== b.year) return a.year - b.year;
            return a.name.localeCompare(b.name);
        });
        
        let tableHtml = `
            <table class="all-notes-table">
                <thead>
                    <tr>
                        <th>图片</th>
                        <th>年份</th>
                        <th>纸币名称</th>
                        <th>克劳斯编号</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        for (let note of allNotes) {
            tableHtml += `
                <tr>
                    <td><img src="${note.yearImg}" class="table-img" onclick="openImageModal('${note.yearImg}')" alt="年份图"></td>
                    <td class="table-year">${note.year}</td>
                    <td>${note.name}</td>
                    <td class="table-krause">${note.krause}</td>
                </tr>
            `;
        }
        
        tableHtml += `
                </tbody>
            </table>
        `;
        
        document.getElementById('allNotesTableContainer').innerHTML = tableHtml;
        
        // 更新折叠按钮上的数量
        const totalCount = banknoteYears.length;
        document.getElementById('collapseTitle').innerText = `全部纸币清单（共 ${totalCount} 张）`;
    }

    // ========== 折叠功能（支持丝滑动画） ==========
    function initCollapsible() {
        const btn = document.getElementById('collapseBtn');
        const content = document.getElementById('collapsibleContent');
        const icon = document.getElementById('collapseIcon');
        
        if (!btn || !content) return;
        
        btn.addEventListener('click', () => {
            const isOpen = content.classList.contains('open');
            if (isOpen) {
                // 收起：先移除 open 类，触发 max-height 过渡
                content.classList.remove('open');
                icon.classList.remove('open');
            } else {
                // 展开
                content.classList.add('open');
                icon.classList.add('open');
                // 首次展开时渲染表格（使用 requestAnimationFrame 确保动画流畅）
                if (document.getElementById('allNotesTableContainer').innerHTML === '') {
                    // 延迟一帧渲染，避免动画卡顿
                    requestAnimationFrame(() => {
                        renderAllNotesTable();
                    });
                }
            }
        });
    }

    renderYearCards();
    renderDecadeScroll();
    renderStats();
    initCollapsible();
</script>
</body>
</html>
