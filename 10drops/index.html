<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>离线英汉词典 · 外置词库版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dict-container {
            max-width: 1300px;
            width: 100%;
            background: #fff;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .dict-header {
            background: linear-gradient(135deg, #1e3c5c, #0f2b44);
            padding: 1.5rem 2rem;
            color: white;
        }

        .dict-header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .dict-header h1 small {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 40px;
        }

        .sub {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 8px;
        }

        /* 下载状态栏 */
        .download-status {
            background: #fef9e3;
            border-bottom: 3px solid #f59e0b;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .status-icon {
            font-size: 1.3rem;
        }

        .status-text {
            flex: 1;
            color: #92400e;
            font-weight: 500;
        }

        .progress-bar-container {
            width: 250px;
            height: 8px;
            background: #ffe4b5;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #f59e0b;
            transition: width 0.3s;
        }

        .retry-btn {
            background: #f59e0b;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .search-section {
            padding: 1.2rem 2rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .search-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .search-input-group {
            flex: 3;
            min-width: 200px;
        }

        .search-input-group input {
            width: 100%;
            padding: 12px 18px;
            font-size: 1rem;
            border: 2px solid #cbd5e1;
            border-radius: 60px;
            outline: none;
        }

        .search-input-group input:focus {
            border-color: #3b82f6;
        }

        .filter-group {
            flex: 2;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-group select, .filter-group button {
            padding: 0 16px;
            height: 48px;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            background: white;
            cursor: pointer;
        }

        .filter-group button {
            background: #1e2a3e;
            color: white;
            border: none;
        }

        .stats-badge {
            font-size: 0.8rem;
            color: #475569;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #e2e8f0;
        }

        .dict-main {
            display: flex;
            flex-wrap: wrap;
        }

        .word-list-panel {
            flex: 1.2;
            min-width: 270px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            max-height: 58vh;
            overflow-y: auto;
        }

        .word-item {
            padding: 12px 18px;
            border-bottom: 1px solid #edf2f7;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-weight: 500;
        }

        .word-item:hover {
            background: #f1f5f9;
        }

        .word-item.active {
            background: #e0f2fe;
            border-left: 4px solid #3b82f6;
            color: #075985;
        }

        .word-text {
            text-transform: lowercase;
            font-family: monospace;
            font-weight: 600;
        }

        .word-part {
            font-size: 0.7rem;
            background: #eef2ff;
            padding: 2px 8px;
            border-radius: 30px;
            color: #2563eb;
        }

        .detail-panel {
            flex: 2.5;
            padding: 1.5rem 2rem;
            min-height: 58vh;
            overflow-y: auto;
        }

        .detail-word {
            font-size: 2rem;
            font-weight: 700;
            border-left: 5px solid #3b82f6;
            padding-left: 20px;
            margin-bottom: 8px;
        }

        .detail-phonetic {
            color: #475569;
            font-family: monospace;
            padding-left: 25px;
            margin-bottom: 12px;
        }

        .part-speech {
            display: inline-block;
            background: #e6f0ff;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1e40af;
            margin: 0 0 1rem 25px;
        }

        .definition-box {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin: 0.5rem 0;
            border: 1px solid #eef2ff;
        }

        .example-box {
            background: #fefce8;
            border-left: 5px solid #eab308;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            margin-top: 16px;
            font-style: italic;
        }

        footer {
            background: #f1f5f9;
            text-align: center;
            padding: 0.8rem;
            font-size: 0.7rem;
            color: #475569;
        }

        @media (max-width: 720px) {
            .word-list-panel { max-height: 35vh; border-right: none; border-bottom: 1px solid #e2e8f0; }
            .detail-panel { min-height: 45vh; }
            .search-section, .dict-header, .download-status { padding: 1rem; }
        }

        .error-status { background: #fee2e2; border-bottom-color: #dc2626; }
        .error-status .status-text { color: #991b1b; }
        .success-status { background: #dcfce7; border-bottom-color: #22c55e; }
        .success-status .status-text { color: #166534; }
        .loading-spinner { width: 20px; height: 20px; border: 2px solid #f59e0b; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="dict-container">
    <div class="dict-header">
        <h1>📖 离线英汉词典 <small>外置词库 · 联网下载一次</small></h1>
        <div class="sub">🌐 首次使用需下载词库 (约4MB)，之后完全离线 | 支持词性/首字母筛选</div>
    </div>

    <div id="downloadStatusBar" class="download-status">
        <span class="status-icon">📡</span>
        <span class="status-text" id="statusText">正在初始化...</span>
        <div class="progress-bar-container" id="progressContainer" style="display: none;">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <button id="retryBtn" class="retry-btn" style="display: none;">🔄 重试下载</button>
    </div>

    <div class="search-section" id="searchSection" style="display: none;">
        <div class="search-wrapper">
            <div class="search-input-group">
                <input type="text" id="searchInput" placeholder="🔍 搜索单词...">
            </div>
            <div class="filter-group">
                <select id="partFilter">
                    <option value="all">📚 全部词性</option>
                    <option value="noun">🏷️ 名词</option>
                    <option value="verb">⚡ 动词</option>
                    <option value="adj">🎨 形容词</option>
                    <option value="adv">✨ 副词</option>
                </select>
                <select id="letterFilter">
                    <option value="all">🔤 所有首字母</option>
                </select>
                <button id="resetBtn">⟳ 重置</button>
            </div>
        </div>
        <div class="stats-badge" id="statsInfo">📖 加载中...</div>
    </div>

    <div class="dict-main" id="dictMain" style="display: none;">
        <div class="word-list-panel" id="wordListPanel">
            <div style="padding: 2rem; text-align:center;">✨ 词库加载完成后显示</div>
        </div>
        <div class="detail-panel" id="detailPanel">
            <div style="text-align:center; color:#94a3b8; margin-top:2rem;">📘 点击左侧单词查看释义</div>
        </div>
    </div>
    <footer>📦 词库托管于 UNPKG + 国内镜像 | 首次下载约4MB | 存储于浏览器 IndexedDB</footer>
</div>

<script>
    // ======================== 使用多个稳定 CDN 源下载词库 ========================
    const DB_NAME = 'OfflineDictV2';
    const STORE_NAME = 'words';
    
    // 多个可靠词库源 (按优先级排序，国内可访问)
    const DICT_SOURCES = [
        'https://unpkg.com/@liub1934/english-dict@1.0.0/dist/dict.min.json',
        'https://cdn.jsdelivr.net/npm/@liub1934/english-dict@1.0.0/dist/dict.min.json',
        'https://raw.githubusercontent.com/skywind3000/ECDICT/master/ecdict.mini.json'
    ];
    
    let db = null;
    let masterWords = [];
    let currentFilterPart = "all";
    let currentLetter = "all";
    let searchKeyword = "";
    let currentActiveWord = null;
    
    // 初始化 IndexedDB
    function initDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onerror = () => reject(req.error);
            req.onsuccess = () => {
                db = req.result;
                resolve(db);
            };
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'word' });
                }
            };
        });
    }
    
    // 检查本地是否有词库
    function hasLocalDict() {
        return new Promise((resolve) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const count = store.count();
            count.onsuccess = () => resolve(count.result > 5000);
            count.onerror = () => resolve(false);
        });
    }
    
    // 从网络下载词库 (带进度)
    function downloadDict(url, onProgress) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.responseType = 'json';
            xhr.onprogress = (e) => {
                if (e.lengthComputable && onProgress) {
                    onProgress(e.loaded / e.total);
                }
            };
            xhr.onload = () => {
                if (xhr.status === 200) {
                    resolve(xhr.response);
                } else {
                    reject(new Error(`HTTP ${xhr.status}`));
                }
            };
            xhr.onerror = () => reject(new Error('网络错误'));
            xhr.send();
        });
    }
    
    // 存储词库到 IndexedDB
    function storeDict(data) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.clear();
            let count = 0;
            // 数据格式可能是数组或对象
            let words = Array.isArray(data) ? data : (data.words || data.dict || []);
            if (!words.length && typeof data === 'object') {
                words = Object.values(data).filter(v => v.word || v.definition);
            }
            for (const item of words) {
                const wordObj = {
                    word: (item.word || item.name || '').toLowerCase(),
                    definition: item.definition || item.translation || item.mean || '',
                    part: item.part || item.pos || item.type || '通用',
                    phonetic: item.phonetic || item.pronounce || '',
                    example: item.example || item.sentence || ''
                };
                if (wordObj.word && wordObj.definition) {
                    store.put(wordObj);
                    count++;
                }
            }
            tx.oncomplete = () => resolve(count);
            tx.onerror = () => reject(tx.error);
        });
    }
    
    // 从本地加载所有单词
    function loadAllWords() {
        return new Promise((resolve) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const req = store.getAll();
            req.onsuccess = () => {
                masterWords = req.result || [];
                masterWords.sort((a,b) => a.word.localeCompare(b.word));
                resolve(masterWords);
            };
            req.onerror = () => resolve([]);
        });
    }
    
    // 渲染 UI
    function renderWordList() {
        if (!masterWords.length) {
            document.getElementById("wordListPanel").innerHTML = '<div style="padding:2rem;text-align:center;">暂无数据</div>';
            return;
        }
        let filtered = [...masterWords];
        if (currentFilterPart !== "all") {
            filtered = filtered.filter(w => w.part && w.part.toLowerCase().includes(currentFilterPart));
        }
        if (searchKeyword.trim()) {
            const kw = searchKeyword.trim().toLowerCase();
            filtered = filtered.filter(w => w.word.includes(kw));
        }
        if (currentLetter !== "all") {
            filtered = filtered.filter(w => w.word.startsWith(currentLetter));
        }
        
        const container = document.getElementById("wordListPanel");
        if (filtered.length === 0) {
            container.innerHTML = '<div style="padding:2rem;text-align:center;">😢 未找到匹配单词</div>';
            document.getElementById("statsInfo").innerHTML = `📊 0 / ${masterWords.length} 个单词`;
            return;
        }
        
        const fragment = document.createDocumentFragment();
        filtered.forEach(entry => {
            const div = document.createElement("div");
            div.className = "word-item";
            if (currentActiveWord?.word === entry.word) div.classList.add("active");
            div.innerHTML = `<span class="word-text">${entry.word}</span><span class="word-part">${entry.part}</span>`;
            div.onclick = () => {
                currentActiveWord = entry;
                showDetail(entry);
                renderWordList();
            };
            fragment.appendChild(div);
        });
        container.innerHTML = "";
        container.appendChild(fragment);
        document.getElementById("statsInfo").innerHTML = `📊 显示 ${filtered.length} / ${masterWords.length} 个单词`;
        
        if (currentActiveWord && !filtered.some(w => w.word === currentActiveWord.word)) {
            currentActiveWord = filtered[0];
            if (currentActiveWord) showDetail(currentActiveWord);
            renderWordList();
        } else if (currentActiveWord) {
            showDetail(currentActiveWord);
        } else if (filtered[0]) {
            currentActiveWord = filtered[0];
            showDetail(currentActiveWord);
            renderWordList();
        }
    }
    
    function showDetail(entry) {
        const detailDiv = document.getElementById("detailPanel");
        if (!entry) return;
        detailDiv.innerHTML = `
            <div class="detail-word">${entry.word}</div>
            <div class="detail-phonetic">🔊 ${entry.phonetic || '音标暂缺'}</div>
            <div class="part-speech">📌 ${entry.part}</div>
            <div class="definition-box">
                <div class="definition-text">${entry.definition}</div>
            </div>
            ${entry.example ? `<div class="example-box">📖 例句: ${entry.example}</div>` : '<div class="example-box">✨ 暂无例句</div>'}
            <hr><div style="font-size:0.7rem; color:#6c757d;">✅ 已缓存于本地 | 离线可用</div>
        `;
    }
    
    function initLetterFilter() {
        const letters = new Set();
        masterWords.forEach(w => {
            const first = w.word.charAt(0).toLowerCase();
            if (/[a-z]/.test(first)) letters.add(first);
        });
        const select = document.getElementById("letterFilter");
        select.innerHTML = '<option value="all">🔤 所有首字母</option>';
        Array.from(letters).sort().forEach(l => {
            const opt = document.createElement("option");
            opt.value = l;
            opt.textContent = l.toUpperCase();
            select.appendChild(opt);
        });
    }
    
    // 主流程：尝试从多个源下载
    async function downloadWithRetry() {
        const statusText = document.getElementById("statusText");
        const progressContainer = document.getElementById("progressContainer");
        const progressFill = document.getElementById("progressFill");
        const retryBtn = document.getElementById("retryBtn");
        
        progressContainer.style.display = "flex";
        retryBtn.style.display = "none";
        document.getElementById("downloadStatusBar").classList.remove("error-status", "success-status");
        
        for (let i = 0; i < DICT_SOURCES.length; i++) {
            const url = DICT_SOURCES[i];
            statusText.innerHTML = `📥 下载词库 (${i+1}/${DICT_SOURCES.length}) 从 ${url.split('/').slice(2,3)}...`;
            try {
                const data = await downloadDict(url, (percent) => {
                    progressFill.style.width = (percent * 100) + '%';
                });
                const count = await storeDict(data);
                if (count > 5000) {
                    statusText.innerHTML = `✅ 下载成功！已存储 ${count} 个单词`;
                    progressFill.style.width = '100%';
                    document.getElementById("downloadStatusBar").classList.add("success-status");
                    return true;
                } else {
                    throw new Error(`词库数据过少 (${count}条)`);
                }
            } catch (err) {
                console.warn(`源 ${url} 失败:`, err);
                continue;
            }
        }
        throw new Error('所有词库源均下载失败');
    }
    
    async function bootstrap() {
        const statusText = document.getElementById("statusText");
        const retryBtn = document.getElementById("retryBtn");
        const searchSection = document.getElementById("searchSection");
        const dictMain = document.getElementById("dictMain");
        
        try {
            await initDB();
            const hasLocal = await hasLocalDict();
            
            if (!hasLocal) {
                statusText.innerHTML = '<span class="loading-spinner"></span> 首次使用，正在连接词库服务器...';
                await downloadWithRetry();
            } else {
                statusText.innerHTML = '📚 检测到本地缓存，直接加载...';
            }
            
            await loadAllWords();
            if (masterWords.length === 0) throw new Error('词库为空');
            
            statusText.innerHTML = `✅ 词典就绪！共 ${masterWords.length} 个单词，完全离线可用`;
            document.getElementById("downloadStatusBar").classList.add("success-status");
            document.getElementById("progressContainer").style.display = "none";
            searchSection.style.display = "block";
            dictMain.style.display = "flex";
            
            initLetterFilter();
            renderWordList();
            
            // 绑定事件
            document.getElementById("searchInput").oninput = (e) => { searchKeyword = e.target.value; renderWordList(); };
            document.getElementById("partFilter").onchange = (e) => { currentFilterPart = e.target.value; renderWordList(); };
            document.getElementById("letterFilter").onchange = (e) => { currentLetter = e.target.value; renderWordList(); };
            document.getElementById("resetBtn").onclick = () => {
                searchKeyword = ""; currentFilterPart = "all"; currentLetter = "all";
                document.getElementById("searchInput").value = "";
                document.getElementById("partFilter").value = "all";
                document.getElementById("letterFilter").value = "all";
                renderWordList();
            };
            
        } catch (err) {
            console.error(err);
            statusText.innerHTML = `❌ 下载失败: ${err.message}。请检查网络后重试`;
            document.getElementById("downloadStatusBar").classList.add("error-status");
            document.getElementById("progressContainer").style.display = "none";
            retryBtn.style.display = "inline-block";
            retryBtn.onclick = () => { bootstrap(); };
        }
    }
    
    bootstrap();
</script>
</body>
</html>
