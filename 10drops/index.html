
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>十滴水 Plus</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --water: #38bdf8;
      --poison: #a855f7;
      --obstacle: #f59e0b;
      --empty: #0b1220;
      --accent: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617, #0f172a 40%, #111827);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }

    .panel {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 16px;
    }

    .stat {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat .value {
      font-size: 24px;
      font-weight: 700;
    }

    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    button, select, input, textarea {
      font: inherit;
    }

    button {
      background: linear-gradient(180deg, #1d4ed8, #1e40af);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.secondary {
      background: linear-gradient(180deg, #374151, #1f2937);
    }
    button.good {
      background: linear-gradient(180deg, #16a34a, #15803d);
    }
    button.warn {
      background: linear-gradient(180deg, #dc2626, #b91c1c);
    }

    .board-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .board-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
    }

    .board {
      display: grid;
      gap: 8px;
      align-self: center;
      width: min(88vw, 720px);
      max-width: 720px;
      aspect-ratio: 1;
    }

    .cell {
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: clamp(16px, 2vw, 26px);
      user-select: none;
      cursor: pointer;
      transition: transform 0.1s ease, border-color 0.12s ease, box-shadow 0.12s ease;
      min-height: 48px;
      position: relative;
      overflow: hidden;
    }

    .cell:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 10px 25px rgba(0,0,0,0.22);
    }

    .cell.empty { background: rgba(2, 6, 23, 0.75); color: #475569; }
    .cell.obstacle { background: rgba(245, 158, 11, 0.18); color: #fbbf24; }
    .cell.water { background: rgba(56, 189, 248, 0.14); color: #7dd3fc; }
    .cell.poison { background: rgba(168, 85, 247, 0.14); color: #d8b4fe; }
    .cell.locked { cursor: not-allowed; opacity: 0.65; }

    .cell::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.14), transparent 40%);
      pointer-events: none;
    }

    .log {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(2,6,23,0.4);
      padding: 12px;
      height: 240px;
      overflow: auto;
      font-size: 13px;
      line-height: 1.55;
      color: #cbd5e1;
      white-space: pre-wrap;
    }

    .editor {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 12px;
      color: var(--text);
      background: rgba(2,6,23,0.5);
      line-height: 1.55;
    }

    .tips {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .footer-note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
      }
      .board {
        width: min(92vw, 680px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>十滴水 Plus</h1>
      <div class="sub">
        点击棋盘上的水滴或毒液进行操作。每局默认 <b>10</b> 步。<br>
        水滴：1 → 2 → 3 → 爆开；毒液：-1 → -2 → -3 → 爆开。<br>
        分数规则：水滴爆开 <b>+1</b>，毒液爆开 <b>-1</b>。
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label">当前分数</div>
          <div id="score" class="value">0</div>
        </div>
        <div class="stat">
          <div class="label">剩余步数</div>
          <div id="moves" class="value">10</div>
        </div>
      </div>

      <div class="controls">
        <button id="newGameBtn" class="good">新随机局</button>
        <button id="resetBtn" class="secondary">重置当前局</button>
        <button id="sampleBtn" class="secondary">载入题目示例</button>
        <button id="applyMapBtn">应用自定义地图</button>
      </div>

      <div class="tips">
        地图输入格式：用空格分隔。支持 <b>#</b>（空）、<b>*</b>（障碍物）、<b>1/2/3</b>（水滴）、<b>-1/-2/-3</b>（毒液）。<br>
        每行一个换行，必须是正方形棋盘。
      </div>

      <div class="editor">
        <textarea id="mapInput"></textarea>
      </div>

      <div class="footer-note">提示：操作期间会锁定棋盘，直到整轮连锁反应结束。</div>
    </section>

    <section class="panel board-panel">
      <div class="board-toolbar">
        <div class="legend">
          <span class="pill"># 空位</span>
          <span class="pill">* 障碍</span>
          <span class="pill">1/2/3 水滴</span>
          <span class="pill">-1/-2/-3 毒液</span>
        </div>
      </div>

      <div id="board" class="board"></div>

      <div>
        <div style="margin-bottom:8px;font-weight:700;">事件日志</div>
        <div id="log" class="log"></div>
      </div>
    </section>
  </div>

  <script>
    const EMPTY = 0;
    const OBSTACLE = 99;
    let board = [];
    let initialBoard = [];
    let score = 0;
    let movesLeft = 10;
    let busy = false;

    const boardEl = document.getElementById('board');
    const logEl = document.getElementById('log');
    const scoreEl = document.getElementById('score');
    const movesEl = document.getElementById('moves');
    const mapInput = document.getElementById('mapInput');

    const sampleMapText = [
      '1 2 1 # 3',
      '3 3 1 2 2',
      '# # # 1 #',
      '1 1 3 # 2',
      '2 2 # # #'
    ].join('\n');

    function cloneBoard(b) {
      return b.map(row => row.slice());
    }

    function log(msg) {
      logEl.textContent += msg + '\n';
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
      logEl.textContent = '';
    }

    function isInside(r, c) {
      return r >= 0 && r < board.length && c >= 0 && c < board.length;
    }

    function formatCell(v) {
      if (v === EMPTY) return '#';
      if (v === OBSTACLE) return '*';
      return String(v);
    }

    function setStats() {
      scoreEl.textContent = score;
      movesEl.textContent = movesLeft;
    }

    function render() {
      const n = board.length;
      boardEl.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
      boardEl.innerHTML = '';

      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          const v = board[r][c];
          const cell = document.createElement('button');
          cell.className = 'cell';
          if (v === EMPTY) cell.classList.add('empty');
          else if (v === OBSTACLE) cell.classList.add('obstacle');
          else if (v > 0) cell.classList.add('water');
          else cell.classList.add('poison');
          if (busy || movesLeft <= 0 || v === EMPTY || v === OBSTACLE) cell.classList.add('locked');
          cell.textContent = formatCell(v);
          cell.title = `(${r}, ${c})`;
          cell.addEventListener('click', () => onCellClick(r, c));
          boardEl.appendChild(cell);
        }
      }
      setStats();
    }

    function boardToText(b) {
      return b.map(row => row.map(formatCell).join(' ')).join('\n');
    }

    function parseMap(text) {
      const rows = text.trim().split(/\n+/).map(line => line.trim()).filter(Boolean);
      if (rows.length === 0) throw new Error('地图不能为空');
      const grid = rows.map(line => line.split(/\s+/).map(token => {
        if (token === '#') return EMPTY;
        if (token === '*') return OBSTACLE;
        const v = Number(token);
        if (![-3, -2, -1, 1, 2, 3].includes(v)) {
          throw new Error(`非法元素: ${token}`);
        }
        return v;
      }));
      const n = grid.length;
      for (const row of grid) {
        if (row.length !== n) throw new Error('必须是正方形棋盘');
      }
      return grid;
    }

    function randomMap(n = 7) {
      const choices = [EMPTY, EMPTY, EMPTY, 1, 1, 2, 3, -1, -2, -3, OBSTACLE];
      const g = [];
      for (let r = 0; r < n; r++) {
        const row = [];
        for (let c = 0; c < n; c++) {
          row.push(choices[Math.floor(Math.random() * choices.length)]);
        }
        g.push(row);
      }
      let playable = false;
      for (const row of g) for (const v of row) if (v !== EMPTY && v !== OBSTACLE) playable = true;
      if (!playable) g[0][0] = 1;
      return g;
    }

    function findFirstNonEmpty(r, c, dr, dc) {
      let nr = r + dr;
      let nc = c + dc;
      while (isInside(nr, nc)) {
        const v = board[nr][nc];
        if (v === OBSTACLE) return { type: 'blocked', r: nr, c: nc };
        if (v !== EMPTY) return { type: 'target', r: nr, c: nc };
        nr += dr;
        nc += dc;
      }
      return null;
    }

    function applyWaterHit(r, c, queue) {
      const v = board[r][c];
      if (v === EMPTY || v === OBSTACLE) return;
      if (v > 0) {
        if (v < 3) {
          board[r][c] = v + 1;
          log(`水滴击中 (${r}, ${c})，${v} -> ${v + 1}`);
        } else {
          board[r][c] = EMPTY;
          score += 1;
          log(`水滴在 (${r}, ${c}) 爆开，得分 +1`);
          queue.push({ kind: 'water-explode', r, c });
        }
      } else {
        if (v === -1) {
          board[r][c] = EMPTY;
          log(`毒液在 (${r}, ${c}) 被水滴削弱后消失`);
        } else {
          board[r][c] = v + 1;
          log(`毒液在 (${r}, ${c}) 被水滴削弱，${v} -> ${v + 1}`);
        }
      }
    }

    function applyPoisonHit(r, c, queue) {
      const v = board[r][c];
      if (v === EMPTY || v === OBSTACLE) return;
      if (v > 0) {
        if (v === 1) {
          board[r][c] = EMPTY;
          log(`水滴在 (${r}, ${c}) 被毒液腐蚀后消失`);
        } else {
          board[r][c] = v - 1;
          log(`水滴在 (${r}, ${c}) 被毒液腐蚀，${v} -> ${v - 1}`);
        }
      } else {
        if (v > -3) {
          board[r][c] = v - 1;
          log(`毒液击中 (${r}, ${c})，${v} -> ${v - 1}`);
        } else {
          board[r][c] = EMPTY;
          score -= 1;
          log(`毒液在 (${r}, ${c}) 爆开，得分 -1`);
          queue.push({ kind: 'poison-explode', r, c });
        }
      }
    }

    function performWaterExplosion(r, c, queue) {
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (const [dr, dc] of dirs) {
        const hit = findFirstNonEmpty(r, c, dr, dc);
        if (!hit) {
          log(`水花从 (${r}, ${c}) 向方向 (${dr}, ${dc}) 飞出后未命中`);
          continue;
        }
        if (hit.type === 'blocked') {
          log(`水花从 (${r}, ${c}) 被障碍物 (${hit.r}, ${hit.c}) 阻挡`);
          continue;
        }
        applyWaterHit(hit.r, hit.c, queue);
      }
    }

    function performPoisonExplosion(r, c, queue) {
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (const [dr, dc] of dirs) {
        const hit = findFirstNonEmpty(r, c, dr, dc);
        if (!hit) {
          log(`毒液从 (${r}, ${c}) 向方向 (${dr}, ${dc}) 飞出后未命中`);
          continue;
        }
        if (hit.type === 'blocked') {
          log(`毒液从 (${r}, ${c}) 被障碍物 (${hit.r}, ${hit.c}) 阻挡`);
          continue;
        }
        applyPoisonHit(hit.r, hit.c, queue);
      }
    }

    async function resolveChain(queue) {
      while (queue.length > 0) {
        const event = queue.shift();
        render();
        await sleep(220);
        if (event.kind === 'water-explode') {
          performWaterExplosion(event.r, event.c, queue);
        } else {
          performPoisonExplosion(event.r, event.c, queue);
        }
      }
      render();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function onCellClick(r, c) {
      if (busy || movesLeft <= 0) return;
      const v = board[r][c];
      if (v === EMPTY || v === OBSTACLE) return;
      busy = true;
      movesLeft -= 1;
      log(`\n第 ${10 - movesLeft} 步：选择 (${r}, ${c})，当前值 ${v}`);

      const queue = [];
      if (v > 0) {
        if (v < 3) {
          board[r][c] = v + 1;
          log(`水滴直接升级：(${r}, ${c}) ${v} -> ${v + 1}`);
        } else {
          board[r][c] = EMPTY;
          score += 1;
          log(`水滴主动爆开：(${r}, ${c})，得分 +1`);
          queue.push({ kind: 'water-explode', r, c });
        }
      } else {
        if (v > -3) {
          board[r][c] = v - 1;
          log(`毒液直接升级：(${r}, ${c}) ${v} -> ${v - 1}`);
        } else {
          board[r][c] = EMPTY;
          score -= 1;
          log(`毒液主动爆开：(${r}, ${c})，得分 -1`);
          queue.push({ kind: 'poison-explode', r, c });
        }
      }

      render();
      await resolveChain(queue);
      busy = false;
      render();

      if (movesLeft <= 0) {
        log(`\n游戏结束。最终分数：${score}`);
      }
    }

    function loadBoard(g, resetScore = true) {
      board = cloneBoard(g);
      initialBoard = cloneBoard(g);
      if (resetScore) score = 0;
      movesLeft = 10;
      mapInput.value = boardToText(g);
      clearLog();
      log('地图已载入。');
      render();
    }

    document.getElementById('newGameBtn').addEventListener('click', () => {
      loadBoard(randomMap(7));
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      loadBoard(initialBoard);
    });

    document.getElementById('sampleBtn').addEventListener('click', () => {
      loadBoard(parseMap(sampleMapText));
    });

    document.getElementById('applyMapBtn').addEventListener('click', () => {
      try {
        const g = parseMap(mapInput.value);
        loadBoard(g);
      } catch (err) {
        alert(err.message);
      }
    });

    loadBoard(parseMap(sampleMapText));
  </script>
</body>
</html>
