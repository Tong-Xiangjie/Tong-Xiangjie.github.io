<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>总网站入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* 整体纯黑背景 */
        body {
            min-height: 100vh;
            background: #000000;
            font-family: 'Segoe UI', 'Inter', 'Fira Code', monospace, system-ui;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* 面板也纯黑，无玻璃模糊、无阴影、无边框 */
        .glass-panel {
            background: #000000;
            border-radius: 2.5rem;
            border: none;
            box-shadow: none;
            width: 100%;
            max-width: 580px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .content {
            padding: 2.2rem 2rem 2.5rem;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-icon {
            font-size: 3.2rem;
            opacity: 0.9;
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #eef2ff, #6bc2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 0.5rem;
        }
        .sub {
            font-size: 0.75rem;
            color: #7e8a9e;
            border-top: 1px dashed #2a3440;
            display: inline-block;
            margin-top: 0.6rem;
            padding-top: 0.5rem;
        }

        .password-section {
            transition: all 0.2s;
        }
        .input-group {
            background: #0e1622cc;
            border-radius: 2rem;
            border: 1px solid #2a3647;
            display: flex;
            align-items: center;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            margin-bottom: 1rem;
        }
        .input-group input {
            background: transparent;
            border: none;
            padding: 1rem 0.5rem 1rem 0;
            font-size: 1.4rem;
            letter-spacing: 4px;
            font-weight: 500;
            color: #c0c0c0;
            width: 100%;
            outline: none;
            font-family: monospace;
        }
        .input-group input::placeholder {
            color: #3a465a;
        }
        .lock-icon {
            color: #4cffb0;
            font-size: 1.4rem;
        }

        /* ———— 按钮颜色完全保留不变 ———— */
        button {
            background: linear-gradient(95deg, #1f2a3e, #0f172a);
            border: 1px solid #2e3b4e;
            color: #b9e2ff;
            font-weight: 600;
            padding: 0.8rem 1.4rem;
            border-radius: 2.5rem;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }
        button:active {
            transform: scale(0.97);
        }
        button:hover {
            background: #1f314a;
            border-color: #3c8dbc;
            color: white;
            box-shadow: 0 0 8px #2d68c0;
        }

        .error-msg {
            color: #ff7a6e;
            font-size: 0.8rem;
            margin-top: 0.75rem;
            text-align: center;
            min-height: 2.5rem;
            font-weight: 500;
            background: transparent;
            border-radius: 2rem;
            padding: 0.4rem;
        }
        .timer-block {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: bold;
            color: #f2b56b;
            background: transparent;
            border-radius: 2rem;
            padding: 0.5rem;
        }

        .dashboard {
            display: none;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            border-left: 5px solid #2bc0ff;
            padding-left: 1rem;
            color: #eef5ff;
        }

        /* 卡片背景纯黑 */
        .site-card {
            background: #000000;
            border-radius: 1.8rem;
            margin-bottom: 1.2rem;
            padding: 1rem 1.5rem;
            border: 1px solid #2c3e55;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .site-card:hover {
            background: #000000;
            border-color: #3e8bcb;
        }
        .site-name {
            font-weight: 600;
            font-size: 1.2rem;
            color: #cdedff;
        }
        .site-link {
            background: #0b1422;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            text-decoration: none;
            color: #6bc2ff;
            border: 1px solid #2e5570;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .site-link:hover {
            background: #000000;
            color: white;
            border-color: #2bc0ff;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            text-align: center;
            color: #3f506e;
            border-top: 1px solid #1e2a3a;
            padding-top: 1rem;
        }
        .back-btn {
            background: none;
            border: 1px solid #3e556e;
            margin-top: 1rem;
            color: #9ab3cf;
            width: auto;
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        input:disabled, button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        @media (max-width: 480px) {
            .content { padding: 1.5rem; }
            .site-card { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
            .site-link { align-self: flex-start; }
        }
    </style>
</head>
<body>

<div class="glass-panel" id="appRoot">
    <div class="content">
        <div id="lockZone">
            <div class="logo-area">
                <img src="images/headphoto.png" class="logo-icon">
                <h1>请验证后进入</h1>
                <div class="sub">VERIFICATION GATE</div>
            </div>
            <div class="password-section">
                <div class="input-group">
                    <span class="lock-icon"></span>
                    <input type="password" id="passwordInput" maxlength="6" placeholder="请输入6位数字密码" inputmode="numeric" pattern="\d*">
                </div>
                <button id="unlockBtn">验证/VERIFY</button>
                <div id="errorMsg" class="error-msg"></div>
                <div id="timerInfo" class="timer-block" style="display: none;"></div>
            </div>
        </div>

        <div id="dashboardZone" class="dashboard">
            <div class="logo-area" style="margin-bottom: 1rem;">
                <img src="images/headphoto.png" class="logo-icon">
                <h1>网页总站</h1>
                <div class="sub">MAIN PORTAL</div>
            </div>
            <div class="section-title">分站入口</div>
            <div class="site-card">
                <span class="site-name">钱币收藏档案</span>
                <a href="https://Tong-Xiangjie.github.io/notecollection/" class="site-link" target="_blank" rel="noopener noreferrer">
                    notecollection ↗
                </a>
            </div>
            <div class="site-card" style="opacity: 0.7;">
                <span class="site-name">更多站点 (敬请期待)</span>
                <span class="site-link" style="background:#11161f; cursor:default;">即将开放</span>
            </div>
            <div class="footer-note">
                网页建立时间：2026年4月4日<br>© 2026 铜香结 版权所有<br>Powered by GitHub Pages
            </div>
            <button id="resetLockBtn" class="back-btn">锁定</button>
        </div>
    </div>
</div>

<script>
    (function(){
        const VALID_CODES = new Set(["070529", "790815"]);
        const LOCK_DURATION_MS = 30000;

        let lockUntil = 0;
        let failCount = 0;
        let timerInterval = null;

        const lockZone = document.getElementById('lockZone');
        const dashboardZone = document.getElementById('dashboardZone');
        const passwordInput = document.getElementById('passwordInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const errorMsgDiv = document.getElementById('errorMsg');
        const timerInfoDiv = document.getElementById('timerInfo');
        const resetLockBtn = document.getElementById('resetLockBtn');

        const STORAGE_KEY = 'lockUntilTimestamp';

        function persistLockUntil() {
            if (lockUntil > 0) {
                localStorage.setItem(STORAGE_KEY, lockUntil.toString());
            } else {
                localStorage.removeItem(STORAGE_KEY);
            }
        }

        function restoreLockFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const storedTime = parseInt(stored, 10);
                const now = Date.now();
                if (storedTime > now) {
                    lockUntil = storedTime;
                    failCount = 0;
                    return true;
                } else {
                    localStorage.removeItem(STORAGE_KEY);
                }
            }
            return false;
        }

        function clearPersistedLock() {
            localStorage.removeItem(STORAGE_KEY);
        }

        function clearTimer() {
            if(timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function releaseLock() {
            const wasLocked = (lockUntil > Date.now());
            lockUntil = 0;
            if (wasLocked) {
                failCount = 0;
                clearPersistedLock();
            }
            clearTimer();
            updateLockUI();
            if (!errorMsgDiv.innerHTML.includes('密码') && !errorMsgDiv.innerHTML.includes('错误')) {
                if (failCount === 0) errorMsgDiv.innerHTML = '';
            }
        }

        function updateLockUI() {
            const now = Date.now();
            const isCurrentlyLocked = (lockUntil > now);

            if (isCurrentlyLocked) {
                const remainSeconds = Math.ceil((lockUntil - now) / 1000);
                timerInfoDiv.style.display = 'block';
                timerInfoDiv.innerHTML = `验证失败次数过多，已锁定。<br>请 ${remainSeconds} 秒后再试。`;
                passwordInput.disabled = true;
                unlockBtn.disabled = true;
                errorMsgDiv.innerHTML = '账户暂时锁定，请稍后再试';
            } else {
                passwordInput.disabled = false;
                unlockBtn.disabled = false;
                timerInfoDiv.style.display = 'none';
                if (errorMsgDiv.innerHTML.includes('锁定') || errorMsgDiv.innerHTML.includes('等待')) {
                    if (failCount === 0) errorMsgDiv.innerHTML = '';
                }
            }
        }

        function applyLockout() {
            const now = Date.now();
            lockUntil = now + LOCK_DURATION_MS;
            persistLockUntil();
            failCount = 0;
            clearTimer();
            updateLockUI();

            timerInterval = setInterval(() => {
                const nowMs = Date.now();
                const remaining = lockUntil - nowMs;
                if (remaining <= 0) {
                    clearTimer();
                    releaseLock();
                    updateLockUI();
                    errorMsgDiv.innerHTML = '锁定已解除，请重新输入密码';
                    setTimeout(() => {
                        if (errorMsgDiv.innerHTML === '锁定已解除，请重新输入密码') {
                            errorMsgDiv.innerHTML = '';
                        }
                    }, 1800);
                    passwordInput.value = '';
                    passwordInput.focus();
                } else {
                    const secs = Math.ceil(remaining / 1000);
                    timerInfoDiv.innerHTML = `验证失败次数过多，已锁定。<br>请 ${secs} 秒后再试。`;
                }
            }, 200);
        }

        function handleFail() {
            if (lockUntil > Date.now()) {
                errorMsgDiv.innerHTML = '系统锁定中，请等待倒计时结束。';
                return;
            }

            failCount++;
            const remainingAttempts = 3 - failCount;
            if (failCount >= 3) {
                errorMsgDiv.innerHTML = `已连续错误3次！系统锁定30秒，无法进行任何操作`;
                applyLockout();
                passwordInput.value = '';
            } else {
                errorMsgDiv.innerHTML = `密码错误！还剩 ${remainingAttempts} 次尝试机会，连续错误3次将锁定30秒`;
                passwordInput.value = '';
                passwordInput.focus();
                timerInfoDiv.style.display = 'none';
            }

            const panel = document.querySelector('.glass-panel');
            if (panel) {
                panel.style.transform = 'translateX(3px)';
                setTimeout(() => { if (panel) panel.style.transform = ''; }, 10);
            }
        }

        function handleSuccess() {
            clearTimer();
            lockUntil = 0;
            failCount = 0;
            clearPersistedLock();
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            timerInfoDiv.style.display = 'none';

            lockZone.style.display = 'none';
            dashboardZone.style.display = 'block';
        }

        function verifyPassword() {
            if (lockUntil > Date.now()) {
                errorMsgDiv.innerHTML = `锁定倒计时进行中，请耐心等待。`;
                return;
            }

            const rawValue = passwordInput.value;
            const trimmed = rawValue.trim();
            if (trimmed.length !== 6) {
                errorMsgDiv.innerHTML = '请输入6位数字密码';
                passwordInput.value = '';
                return;
            }
            if (!/^\d{6}$/.test(trimmed)) {
                errorMsgDiv.innerHTML = '密码必须为6位数字 (0-9)';
                passwordInput.value = '';
                return;
            }

            if (VALID_CODES.has(trimmed)) {
                failCount = 0;
                lockUntil = 0;
                clearTimer();
                clearPersistedLock();
                handleSuccess();
            } else {
                handleFail();
            }
        }

        function resetToLock() {
            dashboardZone.style.display = 'none';
            lockZone.style.display = 'block';
            clearTimer();
            failCount = 0;
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            updateLockUI();
            passwordInput.focus();
        }

        function onEnterKey(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (lockZone.style.display !== 'none') {
                    if (!(lockUntil > Date.now())) {
                        verifyPassword();
                    }
                }
            }
        }

        function enforceNumericInput(e) {
            let input = e.target;
            let value = input.value;
            let newValue = value.replace(/\D/g, '');
            if (newValue.length > 6) newValue = newValue.slice(0,6);
            if (newValue !== value) {
                input.value = newValue;
            }
        }

        function initUI() {
            lockZone.style.display = 'block';
            dashboardZone.style.display = 'none';
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            timerInfoDiv.style.display = 'none';
            failCount = 0;

            restoreLockFromStorage();
            updateLockUI();

            if (lockUntil > Date.now()) {
                clearTimer();
                timerInterval = setInterval(() => {
                    const nowMs = Date.now();
                    const remaining = lockUntil - nowMs;
                    if (remaining <= 0) {
                        clearTimer();
                        releaseLock();
                        updateLockUI();
                        errorMsgDiv.innerHTML = '锁定已解除，请重新输入密码';
                        setTimeout(() => {
                            if (errorMsgDiv.innerHTML === '锁定已解除，请重新输入密码') {
                                errorMsgDiv.innerHTML = '';
                            }
                        }, 1800);
                        passwordInput.value = '';
                        passwordInput.focus();
                    } else {
                        const secs = Math.ceil(remaining / 1000);
                        timerInfoDiv.style.display = 'block';
                        timerInfoDiv.innerHTML = `验证失败次数过多，已锁定。<br>请 ${secs} 秒后再试。`;
                    }
                }, 200);
            }

            unlockBtn.addEventListener('click', verifyPassword);
            resetLockBtn.addEventListener('click', resetToLock);
            passwordInput.addEventListener('input', enforceNumericInput);
            passwordInput.addEventListener('keypress', onEnterKey);
            passwordInput.focus();
        }

        initUI();

        setInterval(() => {
            if (lockUntil > 0 && lockUntil <= Date.now()) {
                releaseLock();
                updateLockUI();
            }
        }, 1000);
    })();
</script>
</body>
</html>
