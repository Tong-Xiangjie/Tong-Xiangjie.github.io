name: Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/upload-pages-artifact@v3
      - uses: actions/deploy-pages@v4

permissions:
  pages: write
  id-token: write
