<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>纪念钞 | 铜の币纪</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #f0ebe3;
    font-family: system-ui, sans-serif;
    color: #2c2418;
    padding: 1.5rem;
    min-height: 100vh;
    padding-top: 70px;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 1.8rem;
    background: linear-gradient(135deg, #b8860b, #daa520);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sub {
    color: #8b6b4f;
    font-size: 0.85rem;
  }

  .back-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #f0ebe3;
    padding: 0.8rem 1.2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    z-index: 999;
  }
  .back-btn {
    background: #fff;
    border: 1px solid #e2d5c8;
    padding: 0.5rem 1rem;
    border-radius: 30px;
    cursor: pointer;
  }

  .list-panel {
    background: #fff;
    border-radius: 1.5rem;
    padding: 1.5rem;
    box-shadow: 0 6px 16px rgba(0,0,0,0.05);
  }
  .panel-header {
    border-left: 5px solid #daa520;
    padding-left: 1rem;
    margin-bottom: 1rem;
  }
  .series-list, .copy-list {
    list-style: none;
  }
  .series-item, .copy-item {
    display: flex;
    align-items: center;
    padding: 0.8rem 0.6rem;
    border-bottom: 1px solid #f0e4d6;
    cursor: pointer;
  }
  .series-item:hover, .copy-item:hover {
    background: #faf5ef;
  }
  .series-name, .copy-version {
    flex: 1;
  }
  .series-count, .copy-badge {
    background: #e8d9cc;
    padding: 0.2rem 0.6rem;
    border-radius: 30px;
    font-size: 0.7rem;
  }
  .series-year {
    width: 110px;
    color: #8b6b4f;
  }
  .copy-index {
    width: 45px;
    font-weight: 600;
    color: #000;
  }
  .copy-price {
    width: 100px;
    text-align: center;
    color: #5a6e4a;
  }

  .detail-panel {
    background: #fff;
    border-radius: 1.5rem;
    padding: 1.8rem;
    box-shadow: 0 6px 16px rgba(0,0,0,0.05);
  }
  .detail-header {
    border-bottom: 2px solid #f0e4d6;
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
  }

  .img-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 2rem;
  }
  .img-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
  }
  .img-box img {
    width: 100%;
    border-radius: 12px;
    background: #faf6ef;
  }
  .img-label {
    margin-top: 8px;
    font-size: 14px;
    font-weight: 500;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .detail-field {
    background: #faf8f5;
    padding: 0.8rem 1rem;
    border-radius: 1rem;
  }
  .detail-field label {
    font-size: 0.7rem;
    color: #999;
    display: block;
    margin-bottom: 0.3rem;
  }
  .remark-box {
    background: #fef9f0;
    border-left: 3px solid #daa520;
    padding: 1rem;
    border-radius: 0.8rem;
  }

  #viewer {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 9999;
    overflow: hidden;
    touch-action: none;
  }
  .viewer-wrap {
    display: flex;
    height: 100%;
  }
  .viewer-slide {
    min-width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .viewer-slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    user-select: none;
  }
</style>
</head>
<body>

<div class="back-bar">
  <button class="back-btn" onclick="location.href='index.html'">← 首页</button>
</div>

<div class="container">
  <div class="header">
    <h1>纪念钞收藏</h1>
    <div class="sub">Commemorative Banknotes Collection</div>
  </div>
  <div id="content"></div>
</div>

<div id="viewer">
  <div class="viewer-wrap" id="viewerWrap">
    <div class="viewer-slide"><img id="vimg1"></div>
    <div class="viewer-slide"><img id="vimg2"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
const cat = allData.commemorative;
let currentSeries = null;

function setContent(html) {
  document.getElementById("content").innerHTML = html;
}
function scrollToTop() {
  window.scrollTo(0, 0);
}

// 系列列表
function renderSeries() {
  let html = `
  <div class="list-panel">
    <div class="panel-header">
      <h2>${cat.icon} ${cat.name}</h2>
      <p>${cat.desc}</p>
    </div>
    <ul class="series-list">`;
  cat.series.forEach((s, i) => {
    html += `
    <li class="series-item" onclick="renderCopies(${i})">
      <div class="series-name">${s.seriesName}</div>
      <div class="series-count">${s.copies.length}张</div>
      <div class="series-year">${s.year}年</div>
    </li>`;
  });
  html += `</ul></div>`;
  setContent(html);
}

// 藏品列表
function renderCopies(si) {
  currentSeries = si;
  scrollToTop();
  const s = cat.series[si];
  let html = `
  <div class="list-panel">
    <div class="panel-header">
      <h2>${s.seriesName}（${s.year}年）</h2>
    </div>
    <ul class="copy-list">`;
  s.copies.forEach((cp, ci) => {
    html += `
    <li class="copy-item" onclick="renderDetail(${si},${ci})">
      <div class="copy-index">#${cp.copyId}</div>
      <div class="copy-badge">${cp.condition || ''}</div>
      <div class="copy-version">${cp.version || ''}</div>
      <div class="copy-price">${cp.price || ''}</div>
    </li>`;
  });
  html += `</ul></div>`;
  setContent(html);
}

// 详情页
function renderDetail(si, ci) {
  scrollToTop();
  const s = cat.series[si];
  const cp = s.copies[ci];
  let html = `
  <div class="detail-panel">
    <div class="detail-header">
      <h3>${s.seriesName}</h3>
      <p>${cp.version} · ${cp.condition}</p>
    </div>

    <div class="img-group">
      <div class="img-box" onclick="openViewer(0,'${cp.img1}','${cp.img2}')">
        <img src="${cp.img1}">
        <div class="img-label">正面</div>
      </div>
      <div class="img-box" onclick="openViewer(1,'${cp.img1}','${cp.img2}')">
        <img src="${cp.img2}">
        <div class="img-label">背面</div>
      </div>
    </div>

    <div class="detail-grid">
      <div class="detail-field"><label>冠号</label><div>${cp.version}</div></div>
      <div class="detail-field"><label>评级</label><div>${cp.condition}</div></div>
      <div class="detail-field"><label>价格</label><div>${cp.price}</div></div>
      <div class="detail-field"><label>发行银行</label><div>${cp.bank}</div></div>
      <div class="detail-field"><label>克劳斯编号</label><div>${cp.krause || '无'}</div></div>
      <div class="detail-field"><label>年份</label><div>${s.year}年</div></div>
    </div>

    <div class="remark-box">
      <label>备注</label>
      <div>${cp.remark || '无'}</div>
    </div>
  </div>`;
  setContent(html);
}

// 大图查看
let current = 0;
let startX = 0;
let scale = 1;
let startDist = 0;
const wrap = viewerWrap;

function openViewer(idx, a, b) {
  vimg1.src = a;
  vimg2.src = b;
  current = idx;
  scale = 1;
  vimg1.style.transform = "scale(1)";
  vimg2.style.transform = "scale(1)";
  updateViewer();
  viewer.style.display = "block";
}

// 点击空白关闭
viewer.addEventListener("click", (e) => {
  if (e.target === viewer) {
    viewer.style.display = "none";
  }
});

viewer.addEventListener("touchstart", (e) => {
  e.preventDefault();
  if (e.touches.length === 1) {
    startX = e.touches[0].clientX;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    startDist = Math.hypot(dx, dy);
  }
});

viewer.addEventListener("touchmove", (e) => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - startX;
    wrap.style.transform = `translateX(calc(-${current * 100}% + ${dx}px))`;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.hypot(dx, dy);
    scale = Math.min(3, Math.max(1, d / startDist));
    vimg1.style.transform = `scale(${scale})`;
    vimg2.style.transform = `scale(${scale})`;
  }
});

viewer.addEventListener("touchend", () => {
  const w = innerWidth;
  const dx = parseFloat(wrap.style.transform.match(/-?\d+/g).pop() || 0);

  if (dx < -w * 0.2) {
    current++;
  } else if (dx > w * 0.2) {
    current--;
  }
  current = Math.max(0, Math.min(1, current));
  updateViewer();
});

function updateViewer() {
  wrap.style.transform = `translateX(-${current * 100}%)`;
}

// 初始化
renderSeries();
</script>
</body>
</html>
