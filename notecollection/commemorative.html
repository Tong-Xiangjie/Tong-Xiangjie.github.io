<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>纪念钞 | 铜の币纪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f0ebe3;font-family:system-ui,sans-serif;color:#2c2418;padding:1.5rem;min-height:100vh;padding-top:70px;}
.container{max-width:1200px;margin:0 auto;}
.header{text-align:center;margin-bottom:2rem;}
.header h1{font-size:1.8rem;background:linear-gradient(135deg,#b8860b,#daa520);-webkit-background-clip:text;background-clip:text;color:transparent;}
.sub{color:#8b6b4f;font-size:0.85rem;margin-top:0.3rem;}

.back-bar{position:fixed;top:0;left:0;width:100%;background:#f0ebe3;padding:0.8rem 1.2rem;z-index:999;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.back-btn{background:white;border:1px solid #e2d5c8;color:#b8860b;padding:0.5rem 1rem;border-radius:30px;cursor:pointer;}

#search-container{background:white;border-radius:1rem;padding:1rem 1.2rem;margin:1.5rem 0;display:flex;flex-wrap:wrap;gap:0.8rem;align-items:center;}
.search-select{padding:0.5rem 0.8rem;border:1px solid #e2d5c8;border-radius:0.6rem;}
.search-input{flex:1;min-width:180px;padding:0.6rem 1rem;border:1px solid #e2d5c8;border-radius:0.6rem;}
.search-btn{background:#daa520;color:white;border:none;padding:0.6rem 1.2rem;border-radius:0.6rem;cursor:pointer;}
.reset-btn{background:#f0ebe3;border:1px solid #e2d5c8;padding:0.6rem 1.2rem;border-radius:0.6rem;cursor:pointer;}

.list-panel{background:white;border-radius:1.5rem;padding:1.5rem;box-shadow:0 6px 16px rgba(0,0,0,0.05);}
.panel-header{border-left:4px solid #daa520;padding-left:1rem;margin-bottom:1rem;}
.series-item{display:flex;align-items:center;padding:1rem;border-bottom:1px solid #f0e4d6;cursor:pointer;}
.series-item:hover{background:#faf5ef;}
.series-name{flex:1;font-weight:500;}
.series-count{background:#e8d9cc;padding:0.2rem 0.6rem;border-radius:30px;font-size:0.7rem;margin-right:1rem;}

.copy-item{display:flex;align-items:center;padding:1rem;border-bottom:1px solid #f0e4d6;cursor:pointer;}
.copy-item:hover{background:#faf5ef;}
.copy-index{width:40px;font-weight:bold;color:#b8860b;}
.copy-badge{background:#e6d5c0;padding:0.2rem 0.6rem;border-radius:20px;font-size:0.7rem;margin-right:1rem;}
.copy-version{flex:1;color:#b8860b;}

.detail-panel{background:white;border-radius:1.5rem;padding:2rem;box-shadow:0 6px 16px rgba(0,0,0,0.05);}
.img-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.img-group img{width:100%;border-radius:10px;cursor:pointer;object-fit:cover;}

.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;margin:1rem 0;}
.detail-field{background:#faf8f5;padding:1rem;border-radius:1rem;}
.detail-field label{font-size:0.7rem;color:#b1967c;}
.remark-box{background:#fef9f0;border-left:4px solid #daa520;padding:1rem;border-radius:1rem;margin-top:1rem;}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;touch-action:none;}
.modal-slider{width:100%;height:100%;display:flex;transition:transform 0.3s ease;}
.modal-slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.modal-slide img{max-width:92%;max-height:92vh;object-fit:contain;user-select:none;transform-origin:center center;}
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <h1>纪念钞收藏</h1>
    <div class="sub">Bilibili @ 铜の币纪</div>
  </div>

  <div class="back-bar">
    <button class="back-btn" onclick="goBack()">← 返回</button>
  </div>

  <div id="search-container">
    <select id="searchType" class="search-select">
      <option value="all">全字段</option>
      <option value="name">名称</option>
      <option value="version">冠号</option>
      <option value="year">年份</option>
      <option value="agency">评级</option>
      <option value="krause">克劳斯</option>
    </select>
    <input id="searchInput" class="search-input" placeholder="搜索当前分类" oninput="doSearch()">
    <button class="search-btn" onclick="doSearch()">搜索</button>
    <button class="reset-btn" onclick="resetSearch()">重置</button>
  </div>

  <div id="content"></div>

  <div class="footer">© 2026 铜の币纪</div>
</div>

<div class="modal" id="imageModal">
  <div class="modal-slider" id="modalSlider">
    <div class="modal-slide"><img id="m1"></div>
    <div class="modal-slide"><img id="m2"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
let page = "series";
let currentSeriesIndex = 0;
let currentCopyIndex = 0;
let history = [];
let searchTimer = null;

const modal = document.getElementById("imageModal");
const slider = document.getElementById("modalSlider");
let slide = 0;
let scale = 1;

function saveHistory(){history.push({page,currentSeriesIndex,currentCopyIndex});}
function goBack(){
  if(history.length===0){location.href="index.html";return;}
  const h=history.pop();
  page=h.page;
  currentSeriesIndex=h.currentSeriesIndex;
  currentCopyIndex=h.currentCopyIndex;
  if(page==="series") renderSeries();
  else if(page==="copies") renderCopies();
  else if(page==="detail") renderDetail();
  else if(page==="search") renderSearch(lastSearch);
}

function renderSeries(){
  page="series";
  const data=allData.commemorative.series;
  let html=`<div class="list-panel"><div class="panel-header"><h2>所有纪念钞系列</h2></div>`;
  data.forEach((s,i)=>{
    html+=`
    <div class="series-item" onclick="openCopies(${i})">
      <div class="series-name">${s.seriesName}</div>
      <div class="series-count">${s.copies.length}张</div>
      <div>${s.year}</div>
    </div>`;
  });
  html+="</div>";
  document.getElementById("content").innerHTML=html;
}

function openCopies(i){saveHistory();currentSeriesIndex=i;page="copies";renderCopies();}
function renderCopies(){
  const s=allData.commemorative.series[currentSeriesIndex];
  let html=`<div class="list-panel"><div class="panel-header"><h2>${s.seriesName} (${s.year})</h2></div>`;
  s.copies.forEach((c,i)=>{
    html+=`
    <div class="copy-item" onclick="openDetail(${i})">
      <div class="copy-index">#${c.copyId}</div>
      <div class="copy-badge">${c.condition}</div>
      <div class="copy-version">${c.version}</div>
      <div>${c.price}</div>
    </div>`;
  });
  html+="</div>";
  document.getElementById("content").innerHTML=html;
}

function openDetail(i){saveHistory();currentCopyIndex=i;page="detail";renderDetail();}
function renderDetail(){
  const s=allData.commemorative.series[currentSeriesIndex];
  const c=s.copies[currentCopyIndex];
  const html=`
  <div class="detail-panel">
    <div class="img-group">
      <img src="${c.img1}" onclick="openImg('${c.img1}','${c.img2}')">
      <img src="${c.img2}" onclick="openImg('${c.img1}','${c.img2}')">
    </div>
    <div class="detail-grid">
      <div class="detail-field"><label>冠号</label><div>${c.version}</div></div>
      <div class="detail-field"><label>评级</label><div>${c.condition}</div></div>
      <div class="detail-field"><label>价格</label><div>${c.price}</div></div>
      <div class="detail-field"><label>银行</label><div>${c.bank}</div></div>
      <div class="detail-field"><label>克劳斯</label><div>${c.krause||''}</div></div>
      <div class="detail-field"><label>年份</label><div>${s.year}</div></div>
    </div>
    <div class="remark-box"><label>备注</label><div>${c.remark||''}</div></div>
  </div>`;
  document.getElementById("content").innerHTML=html;
}

function openImg(a,b){
  document.getElementById("m1").src=a;
  document.getElementById("m2").src=b;
  modal.style.display="block";
  slide=0;scale=1;
  slider.style.transform="translateX(0)";
  document.querySelectorAll(".modal-slide img").forEach(i=>i.style.transform="scale(1)");
}

modal.onclick=(e)=>{if(e.target===modal)modal.style.display="none";}
let startX=0;let moveX=0;
document.addEventListener("touchstart",(e)=>{startX=e.touches[0].clientX;},{passive:true});
document.addEventListener("touchmove",(e)=>{
  if(!modal.style.display||modal.style.display==="none")return;
  if(e.touches.length===1){
    moveX=e.touches[0].clientX-startX;
  }
}, {passive:true});
document.addEventListener("touchend",()=>{
  if(!modal.style.display||modal.style.display==="none")return;
  if(moveX<-50){slide=1;}
  if(moveX>50){slide=0;}
  slider.style.transform=`translateX(-${slide*100}%)`;
  moveX=0;
});

let lastSearch=[];
function doSearch(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    const t=document.getElementById("searchType").value;
    const kw=document.getElementById("searchInput").value.trim().toLowerCase();
    if(!kw){renderSeries();return;}
    let res=[];
    allData.commemorative.series.forEach((s,si)=>{
      s.copies.forEach((c,ci)=>{
        let match=false;
        const str=`${s.seriesName} ${c.version} ${s.year} ${c.condition} ${c.krause}`.toLowerCase();
        if(t==="all"&&str.includes(kw))match=true;
        else if(t==="name"&&s.seriesName.toLowerCase().includes(kw))match=true;
        else if(t==="version"&&c.version?.toLowerCase().includes(kw))match=true;
        else if(t==="year"&&s.year.toString().includes(kw))match=true;
        else if(t==="agency"&&c.condition?.toLowerCase().includes(kw))match=true;
        else if(t==="krause"&&c.krause?.toLowerCase().includes(kw))match=true;
        if(match)res.push({si,ci});
      });
    });
    lastSearch=res;
    page="search";
    let html=`<div class="list-panel"><div class="panel-header"><h2>搜索结果 ${res.length} 件</h2></div>`;
    if(res.length===0)html+=`<div style="padding:2rem;text-align:center;">无结果</div>`;
    else{
      res.forEach(item=>{
        const s=allData.commemorative.series[item.si];
        const c=s.copies[item.ci];
        html+=`
        <div class="copy-item" onclick="jumpDetail(item.si,item.ci)">
          <div class="copy-index">#${c.copyId}</div>
          <div class="copy-badge">${c.condition}</div>
          <div class="copy-version">${c.version}</div>
          <div>${c.price}</div>
        </div>`;
      });
    }
    html+="</div>";
    document.getElementById("content").innerHTML=html;
  },200);
}

function jumpDetail(si,ci){
  saveHistory();currentSeriesIndex=si;currentCopyIndex=ci;page="detail";renderDetail();
}
function resetSearch(){document.getElementById("searchInput").value="";renderSeries();}

window.onload=()=>{
  const p=new URLSearchParams(location.search);
  const kw=p.get("keyword");
  const type=p.get("type");
  if(kw){
    document.getElementById("searchInput").value=kw;
    document.getElementById("searchType").value=type||"all";
    doSearch();
  }else renderSeries();
}
</script>
</body>
</html>
